name: On Pull Request - Dockerfile

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "src/dms/Dockerfile"
      - "src/config/Dockerfile"
      - ".github/workflows/on-pullrequest-dockerfile.yml"
      # The DMS image bundles the api-schema-tools connection validator, so a change to that tool or the
      # shared package/restore configuration can alter the bundled provider parsers the oracle exercises.
      - "src/dms/clis/EdFi.DataManagementService.SchemaTools/**"
      - "src/Directory.Packages.props"
      - "src/nuget.config"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

permissions: read-all

jobs:
  docker-analysis:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          [
            { name: "dms", path: "src/dms/Dockerfile" },
            { name: "config", path: "src/config/Dockerfile" }
          ]
    name: Analyze ${{ matrix.dockerfile.name }} Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Hadolint Linter on ${{ matrix.dockerfile.name }} Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile.path }}
          failure-threshold: error
          # DL3022 warning: `COPY --from` should reference a previously defined `FROM` alias
          # ... this rule does not work well when the "from" is an additional _context_.
          ignore: DL3022

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Build ${{ matrix.dockerfile.name }} image
        run: |
          path="${{ matrix.dockerfile.path }}"
          folder=${path%/*}
          cd "$folder"
          dockerfile="${path##*/}"

          docker buildx build \
            -f "$dockerfile" \
            -t ${{ matrix.dockerfile.name }}:pr-test \
            --build-context parentdir=../ \
            --load \
            .

      - name: Validate bundled connection-string provider oracle
        if: matrix.dockerfile.name == 'dms'
        run: |
          # Provider oracle (finding 6): run the EXACT api-schema-tools artifact bundled in the dms:pr-test
          # image built by THIS workflow run - not a published image or a separately built tool - offline, to
          # prove both runtime provider parsers (Npgsql / Microsoft.Data.SqlClient) are packaged and the CLI
          # contract holds. The connection string is piped on stdin so credentials never appear in arguments;
          # --network none guarantees a parse-only run (no connection is attempted). Passwords below are
          # parse-only dummies.
          image="dms:pr-test"
          tool="/app/ApiSchemaTools/api-schema-tools.dll"

          assert_valid() {
            local label="$1" engine="$2" conn="$3" expected_db="$4" out code valid db
            if out="$(printf '%s' "$conn" | docker run --rm -i --network none --entrypoint dotnet "$image" "$tool" connection validate --engine "$engine")"; then code=0; else code=$?; fi
            echo "[$label] exit=$code stdout=$out"
            if [ "$code" -ne 0 ]; then echo "::error::[$label] expected exit 0, got $code"; exit 1; fi
            if ! printf '%s' "$out" | jq -e . >/dev/null 2>&1; then echo "::error::[$label] stdout is not valid JSON"; exit 1; fi
            valid="$(printf '%s' "$out" | jq -r '.valid')"
            db="$(printf '%s' "$out" | jq -r '.database')"
            if [ "$valid" != "true" ]; then echo "::error::[$label] expected valid=true, got '$valid' (a missing provider dependency parses as valid=false)"; exit 1; fi
            if [ "$db" != "$expected_db" ]; then echo "::error::[$label] expected database='$expected_db', got '$db'"; exit 1; fi
            echo "[$label] OK: valid=true database=$db"
          }

          # PostgreSQL parser (Npgsql): a valid connection string resolves the expected database.
          assert_valid "postgresql" "postgresql" \
            "host=dms-postgresql;port=5432;username=postgres;password=not-a-real-secret;database=edfi_provider_oracle_pg;" \
            "edfi_provider_oracle_pg"

          # SQL Server parser (Microsoft.Data.SqlClient): Database/Initial Catalog resolves the expected database.
          assert_valid "mssql" "mssql" \
            "Server=dms-mssql;Database=edfi_provider_oracle_mssql;User Id=sa;Password=not-a-real-secret;TrustServerCertificate=true;" \
            "edfi_provider_oracle_mssql"

          # Unsupported engine: the documented usage error - a nonzero exit (2) plus the unsupported-engine
          # diagnostic on stderr, distinct from a { valid: false } result.
          if err="$(printf '%s' 'host=h;database=x;' | docker run --rm -i --network none --entrypoint dotnet "$image" "$tool" connection validate --engine mysql 2>&1 1>/dev/null)"; then code=0; else code=$?; fi
          echo "[unsupported] exit=$code stderr=$err"
          if [ "$code" -ne 2 ]; then echo "::error::[unsupported] expected the documented usage exit 2, got $code"; exit 1; fi
          if ! printf '%s' "$err" | grep -q "Unsupported engine"; then echo "::error::[unsupported] missing unsupported-engine diagnostic"; exit 1; fi
          echo "[unsupported] OK: exit 2 with unsupported-engine diagnostic"

          echo "Provider oracle passed: PostgreSQL and SQL Server parsers are packaged and the unsupported engine is rejected."

      - name: Analyze with Docker Scout
        uses: docker/scout-action@b23590dc1e4d09febc00cfcbc51e9e8c0f7ee9f3 # v1.16.1
        with:
          command: cves
          image: local://${{ matrix.dockerfile.name }}:pr-test
          sarif-file: sarif-${{ matrix.dockerfile.name }}.output.json
          summary: true
          only-severities: "critical"

      - name: Upload SARIF result
        id: upload-sarif
        if: ${{ github.event_name != 'pull_request_target' }}
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169 # v3.28.0
        with:
          sarif_file: sarif-${{ matrix.dockerfile.name }}.output.json
          category: docker-scout-${{ matrix.dockerfile.name }}

      - name: Upload Scout analysis artifact
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: docker-scout-analysis-${{ matrix.dockerfile.name }}
          path: |
            sarif-${{ matrix.dockerfile.name }}.output.json

      - name: Check for Critical and High vulnerabilities
        run: |
          $sarifFile = "sarif-${{ matrix.dockerfile.name }}.output.json"

          if (-not (Test-Path $sarifFile)) {
            Write-Host "⚠️ SARIF file not found: $sarifFile"
            exit 0
          }

          $sarifContent = Get-Content -Path $sarifFile -Raw | ConvertFrom-Json
          $criticalVulnerabilities = 0
          $highVulnerabilities = 0

          foreach ($run in $sarifContent.runs) {
            foreach ($result in $run.results) {
              # Extract severity from the message text
              if ($result.message.text -match "Severity\s+:\s+(\w+)") {
                $severity = $matches[1].Trim()

                if ($severity -ieq "critical") {
                  $criticalVulnerabilities++
                  Write-Host "❌ Found $severity vulnerability: $($result.ruleId)"

                  if ($result.message.text) {
                    # Extract package info if available
                    if ($result.message.text -match "Package\s+:\s+([^\n]+)") {
                      Write-Host "   Package: $($matches[1].Trim())"
                    }
                  }
                }
                if ($severity -ieq "high") {
                  $highVulnerabilities++
                  Write-Host "❌ Found $severity vulnerability: $($result.ruleId)"

                  if ($result.message.text) {
                    # Extract package info if available
                    if ($result.message.text -match "Package\s+:\s+([^\n]+)") {
                      Write-Host "   Package: $($matches[1].Trim())"
                    }
                  }
                }
              }
            }
          }

          Write-Host "`n========================================="
          Write-Host "DOCKER SCOUT PR ANALYSIS - ${{ matrix.dockerfile.name }}"
          Write-Host "========================================="
          Write-Host "Critical vulnerabilities: $criticalHighVulnerabilities"
          Write-Host "=========================================`n"

          if ($criticalVulnerabilities -gt 0) {
            Write-Error "❌ Found $criticalVulnerabilities critical vulnerabilities in ${{ matrix.dockerfile.name }}."
            Write-Host "Please review the Security tab for details and remediate before merging."
            exit 1
          } else {
            Write-Host "✅ No critical vulnerabilities found in ${{ matrix.dockerfile.name }}."
          }
        shell: pwsh
