name: Build Populated Template Package

on:
  workflow_call:
    inputs:
      standard_version:
        description: "Ed-Fi Data Standard version"
        required: true
        type: string
      package_name:
        description: "Package name"
        required: true
        type: string
      manifest_file:
        description: "Manifest file path"
        required: true
        type: string
      provenance_file:
        description: "Provenance file name"
        required: true
        type: string
      publish_package:
        description: "Publish the built populated template package to the Azure Artifacts feed"
        required: false
        type: boolean
        default: true
      use_relational_backend:
        description: "Build the populated template from a DMS stack running the relational backend"
        required: false
        type: boolean
        default: false
      environment_file:
        description: "Docker compose environment file used to start/provision the stack"
        required: false
        type: string
        default: "./.env.e2e"
      verify_restore:
        description: "Run template package restore verification"
        required: false
        type: boolean
        default: false
      require_populated_data:
        description: "Require populated data during restore verification"
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN:
        required: true
    outputs:
      hash-code:
        description: "Hash code of the built package"
        value: ${{ jobs.build-template.outputs.hash-code }}
      dms-version:
        description: "DMS version"
        value: ${{ jobs.build-template.outputs.dms-version }}
      sbom-hash-code:
        description: "SBOM hash code"
        value: ${{ jobs.generate-package-sbom.outputs.sbom-hash-code }}

env:
  ARTIFACTS_FEED_URL: ${{ vars.AZURE_ARTIFACTS_FEED_URL }}
  ARTIFACTS_PACKAGES_URL: ${{ vars.ARTIFACTS_PACKAGES_URL }}
  ARTIFACTS_USERNAME: ${{ secrets.AZURE_ARTIFACTS_USER_NAME }}
  ARTIFACTS_API_KEY: ${{ secrets.AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN }}
  VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: '{"endpointCredentials": [{"endpoint": "https://pkgs.dev.azure.com/ed-fi-alliance/Ed-Fi-Alliance-OSS/_packaging/EdFi/nuget/v3/index.json","password": "${{ secrets.AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN }}"}]}'

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build-template:
    name: Build Populated Template Package
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    outputs:
      hash-code: ${{ steps.hash-code.outputs.hash-code }}
      dms-version: ${{ steps.versions.outputs.dms-v }}
    steps:
      - name: Validate workflow inputs
        run: |
          $useRelationalBackend = [bool]::Parse('${{ inputs.use_relational_backend }}')
          $verifyRestore = [bool]::Parse('${{ inputs.verify_restore }}')
          $requirePopulatedData = [bool]::Parse('${{ inputs.require_populated_data }}')
          $environmentFile = '${{ inputs.environment_file }}'

          if ($useRelationalBackend -and $environmentFile -ne './.env.template.relational') {
            throw "use_relational_backend requires environment_file './.env.template.relational'; got '$environmentFile'."
          }
          if ($requirePopulatedData -and -not $verifyRestore) {
            throw "require_populated_data requires verify_restore."
          }
          if ($verifyRestore -and -not $useRelationalBackend) {
            throw "verify_restore requires use_relational_backend; verification compares the restored package against the relational source database."
          }

      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Checkout Ed-Fi-Data-Standard
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Ed-Fi-Alliance-OSS/Ed-Fi-Data-Standard
          path: Ed-Fi-Data-Standard/
          ref: v${{ inputs.standard_version }} # Added v prefix to match the tag format

      - name: Setup dotnet
        if: ${{ inputs.use_relational_backend }}
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Resolve relational database name
        if: ${{ inputs.use_relational_backend }}
        run: |
          Import-Module ./env-utility.psm1 -Force
          $envValues = ReadValuesFromEnvFile "${{ inputs.environment_file }}"
          $relationalDatabaseName = [string]$envValues["RELATIONAL_E2E_DATABASE_NAME"]
          if ([string]::IsNullOrWhiteSpace($relationalDatabaseName)) {
            throw "RELATIONAL_E2E_DATABASE_NAME must be set in ${{ inputs.environment_file }}"
          }
          "RELATIONAL_DB_NAME=$relationalDatabaseName" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: eng/docker-compose/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/dms/Dockerfile', 'src/dms/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: dms-local-dms:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Set Version Numbers
        id: versions
        run: |
          Import-Module ./package-helpers.psm1
          Get-VersionNumber -projectPrefix "dms" # Match the DMS version

      - name: Start DMS Docker
        if: ${{ !inputs.use_relational_backend }}
        run: |
          $env:USE_API_SCHEMA_PATH="false"
          $env:LOG_LEVEL="Warning"
          ./start-local-dms.ps1 -EnvironmentFile "${{ inputs.environment_file }}" -enableConfig
        working-directory: eng/docker-compose/

      - name: Start DMS Docker (relational backend)
        if: ${{ inputs.use_relational_backend }}
        run: |
          $env:LOG_LEVEL="Warning"
          ./start-local-dms.ps1 -EnvironmentFile "${{ inputs.environment_file }}" -EnableConfig
        working-directory: eng/docker-compose/

      - name: Provision relational database
        if: ${{ inputs.use_relational_backend }}
        run: |
          ./provision-relational-e2e-database.ps1 -EnvironmentFile "${{ inputs.environment_file }}" -Configuration Release
        working-directory: eng/docker-compose/

      # DMS fails fatally at startup when the Configuration Service has no data stores.
      # No data store is created by default; register the single relational data store here
      # and hand its id forward; the Configuration Service protects data store connection
      # strings in API responses, so the id from registration is the only reliable way to
      # select this data store later.
      - name: Register relational data store
        if: ${{ inputs.use_relational_backend }}
        run: |
          Import-Module ../Dms-Management.psm1 -Force
          Import-Module ./env-utility.psm1 -Force
          $envValues = ReadValuesFromEnvFile "${{ inputs.environment_file }}"
          Add-CmsClient -CmsUrl "http://localhost:8081" -ClientId "data-store-admin" -ClientSecret "ValidClientSecret1234567890!Abcd" -DisplayName "Data Store Setup Administrator"
          $configToken = Get-CmsToken -CmsUrl "http://localhost:8081" -ClientId "data-store-admin" -ClientSecret "ValidClientSecret1234567890!Abcd"
          $dataStoreId = Add-DataStore -CmsUrl "http://localhost:8081" -AccessToken $configToken -PostgresPassword $envValues.POSTGRES_PASSWORD -PostgresDbName $env:RELATIONAL_DB_NAME -Name "Relational Template Data Store" -DataStoreType "Template"
          if (-not $dataStoreId) {
            throw "Failed to register the relational data store."
          }
          "RELATIONAL_DATA_STORE_ID=$dataStoreId" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: eng/docker-compose/

      - name: Restart DMS to load the provisioned relational schema
        if: ${{ inputs.use_relational_backend }}
        run: |
          docker restart dms-local-dms-1

      - name: Wait for DMS to be ready
        run: |
          $maxAttempts = 30
          $attempt = 0
          $ready = $false

          while (-not $ready -and $attempt -lt $maxAttempts) {
            $attempt++
            Write-Host "Waiting for DMS to be ready (attempt $attempt/$maxAttempts)..."

            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/resources-spec.json" -Method Get -TimeoutSec 5 -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                $ready = $true
                Write-Host "DMS is ready!"
              }
            }
            catch {
              Write-Host "DMS not ready yet: $_"
              Start-Sleep -Seconds 10
            }
          }

          if (-not $ready) {
            throw "DMS did not become ready within the timeout period"
          }

      - name: Generate Populated Template package
        if: ${{ !inputs.use_relational_backend }}
        run: |
          Import-Module ./Template-Management.psm1 -Force

          # Generate unique application name for this run
          $uniqueAppName = "Demo application ${{ github.run_id }}"

          $packageVersion = "${{ steps.versions.outputs.dms-semver }}" -replace "dms-v", ""
          Build-Template `
                  -TemplateType Populated `
                  -DmsUrl 'http://localhost:8080' `
                  -CmsUrl 'http://localhost:8081' `
                  -MinimalSampleDataDirectory '${{ github.workspace }}/Ed-Fi-Data-Standard/Descriptors' `
                  -PopulatedSampleDataDirectory '${{ github.workspace }}/Ed-Fi-Data-Standard/Samples/Sample XML' `
                  -Extension 'ed-fi'`
                  -ConfigFilePath './PopulatedTemplateSettings.psd1' `
                  -StandardVersion '${{ inputs.standard_version }}'`
                  -PackageVersion $packageVersion `
                  -ApplicationName $uniqueAppName
        working-directory: eng/DatabaseTemplates/

      - name: Generate Populated Template package (relational backend)
        if: ${{ inputs.use_relational_backend }}
        run: |
          Import-Module ./Template-Management.psm1 -Force

          # Generate unique application name for this run
          $uniqueAppName = "Demo application ${{ github.run_id }}"

          $packageVersion = "${{ steps.versions.outputs.dms-semver }}" -replace "dms-v", ""
          Build-Template `
                  -TemplateType Populated `
                  -DmsUrl 'http://localhost:8080' `
                  -CmsUrl 'http://localhost:8081' `
                  -MinimalSampleDataDirectory '${{ github.workspace }}/Ed-Fi-Data-Standard/Descriptors' `
                  -PopulatedSampleDataDirectory '${{ github.workspace }}/Ed-Fi-Data-Standard/Samples/Sample XML' `
                  -Extension 'ed-fi' `
                  -ConfigFilePath './PopulatedTemplateSettings.psd1' `
                  -StandardVersion '${{ inputs.standard_version }}' `
                  -PackageVersion $packageVersion `
                  -ApplicationName $uniqueAppName `
                  -DataStoreDatabaseName $env:RELATIONAL_DB_NAME `
                  -DataStoreId $env:RELATIONAL_DATA_STORE_ID `
                  -DumpAllUserSchemas
        working-directory: eng/DatabaseTemplates/

      - name: Verify template package restore
        if: ${{ inputs.verify_restore }}
        run: |
          $verifyParams = @{ SourceDatabaseName = $env:RELATIONAL_DB_NAME }
          if ([bool]::Parse('${{ inputs.require_populated_data }}')) {
            $verifyParams.RequirePopulatedData = $true
          }
          ./verify-template-restore.ps1 @verifyParams
        working-directory: eng/DatabaseTemplates/

      - name: Upload Bulk Load Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Bulkload-logs
          path: ${{ github.workspace }}/eng/DatabaseTemplates/.packages/**/logfile.txt
          retention-days: 10

      - name: Export Docker Logs
        if: failure()
        run: |
          $logDir = "${{ github.workspace }}/logs"
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          docker ps --format "{{.Names}}" | ForEach-Object {
              $container = $_
              $logPath = Join-Path $logDir "$container.log"
              docker logs $container > $logPath
          }
        shell: pwsh

      - name: Upload Docker Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Docker-Logs
          path: ${{ github.workspace }}/logs
          retention-days: 10

      - name: Generate hash for NuGet package
        id: hash-code
        run: |
          "hash-code=$(sha256sum *.nupkg | base64 -w0)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        working-directory: eng/DatabaseTemplates/

      - name: Upload Populated Template Package as Artifact
        if: success()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: "${{ inputs.package_name }}-NuGet"
          path: ${{ github.workspace }}/eng/DatabaseTemplates/*.nupkg
          if-no-files-found: error
          retention-days: 30

  generate-package-sbom:
    name: Create Populated Template SBOM
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    needs: build-template
    permissions:
      actions: read
      contents: write
    outputs:
      sbom-hash-code: ${{ steps.sbom-hash-code.outputs.sbom-hash-code }}
    steps:
      - name: Get Populated Template Package Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: ${{ inputs.package_name }}-NuGet

      - name: Generate Populated Template Software Bill of Materials (SBOM)
        run: |
          $packageName = "${{ inputs.package_name }}"
          $version = "${{ needs.build-template.outputs.dms-version }}"

          Get-ChildItem -Include "$packageName.*.nupkg" -Recurse | ForEach-Object { $_.FullName } > buildfilelist.txt

          dotnet tool install --global Microsoft.Sbom.DotNetTool

          sbom-tool generate `
              -b ./ `
              -bl ./buildfilelist.txt `
              -bc "./" `
              -pn "$packageName" `
              -pv $version `
              -nsb https://ed-fi.org `
              -m ./ `
              -ps "Ed-Fi Alliance"

          cp _manifest/spdx_2.2/manifest.spdx.* .

      - name: Upload Populated Template SBOM
        if: success()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: ${{ inputs.package_name }}-SBOM
          path: ${{ inputs.manifest_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Generate Populated Template SBOM Hash Code
        id: sbom-hash-code
        shell: bash
        run: |
          # sha256sum returns "<hashcode>  <name of file". Split that and return only the <hashcode>.
          sbom_hash=$(sha256sum ./${{ inputs.manifest_file }} | awk '{split($0,a); print a[1]}')
          echo "sbom-hash-code=$sbom_hash" >> $GITHUB_OUTPUT

  generate-package-provenance:
    name: Create DMS Provenance
    needs: build-template
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: Ed-Fi-Alliance-OSS/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build-template.outputs.hash-code }}
      provenance-name: ${{ inputs.provenance_file }}
      upload-assets: false
      # TODO: remove this after this issue is resolved: https://github.com/slsa-framework/slsa-github-generator/issues/876
      compile-generator: true

  publish-template-package:
    name: Publish Populated Template Package
    if: ${{ inputs.publish_package }}
    needs:
      - build-template
      - generate-package-sbom
      - generate-package-provenance
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Populated Template Package Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: ${{ inputs.package_name }}-NuGet

      - name: Install-credential-handler
        run: |
          Import-Module ./package-helpers.psm1
          InstallCredentialHandler

      - name: Push Populated Template Package to Azure
        run: |
          $artifact = (Get-ChildItem -Name -Include *.nupkg)
          
          $artifact | ForEach-Object {
              Write-Host "Pushing $_ to ${{ env.ARTIFACTS_FEED_URL }}"
              dotnet nuget push $_ --api-key "${{ env.ARTIFACTS_API_KEY }}" --source "${{ env.ARTIFACTS_FEED_URL }}" --skip-duplicate
           }

  promote-azure-package:
    name: Promote Azure Package
    if: ${{ github.event_name == 'release'  }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Promote Populated Template Azure Package
        run: |
          $arguments = @{
            PackagesURL = "${{ env.ARTIFACTS_PACKAGES_URL }}"
            Username    = "${{ env.ARTIFACTS_USERNAME }}"
            ViewId      = "release"
            ReleaseRef  = "${{ github.ref_name }}"
            Password    = (ConvertTo-SecureString -String "${{ env.ARTIFACTS_API_KEY }}" -AsPlainText -Force)
            PackageName = "${{ inputs.package_name}}"
          }

          Import-Module ./package-helpers.psm1
          Invoke-Promote @arguments

  attach-sbom-and-provenance-to-release:
    name: Attach Populated Template SBOM and Provenance to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - generate-package-sbom
      - generate-package-provenance
    if: ${{ startsWith(github.ref, 'refs/tags/') }} # Only run on releases
    permissions:
      contents: write
    steps:
      - name: Download SBOM Artifact
        uses: Ed-Fi-Alliance-OSS/slsa-github-generator/.github/actions/secure-download-artifact@v2.0.0
        with:
          name: "${{ inputs.package_name }}-SBOM"
          path: ${{ inputs.manifest_file }}
          sha256: "${{ needs.generate-package-sbom.outputs.sbom-hash-code }}"

      - name: Download Provenance Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: ${{ inputs.provenance_file }}

      - name: Attach SBOM to Release
        shell: pwsh
        run: |
          $release = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $file = "${{ inputs.manifest_file }}"
          $uploadName = "${{ inputs.package_name }}-SBOM.zip"

          $url = "https://api.github.com/repos/$repo/releases/tags/$release"
          $gh_headers = @{
              "Accept"        = "application/vnd.github+json"
              "Authorization" = "Bearer $token"
          }
          $response = Invoke-RestMethod -Uri $url -Headers $gh_headers
          $releaseId = $response.id

          Compress-Archive $file -DestinationPath $uploadName
          $url = "https://uploads.github.com/repos/$repo/releases/$releaseId/assets"
          $gh_headers["Content-Type"] = "application/octet"
          Invoke-RestMethod -Method POST `
              -Uri "$($url)?name=$($uploadName)" `
              -Headers $gh_headers `
              -InFile $uploadName

      - name: Attach Provenance to Release
        shell: pwsh
        run: |
          $release = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $file = "${{ inputs.provenance_file }}"
          $uploadName = "${{ inputs.provenance_file }}"

          $url = "https://api.github.com/repos/$repo/releases/tags/$release"
          $gh_headers = @{
              "Accept"        = "application/vnd.github+json"
              "Authorization" = "Bearer $token"
          }
          $response = Invoke-RestMethod -Uri $url -Headers $gh_headers
          $releaseId = $response.id
          $url = "https://uploads.github.com/repos/$repo/releases/$releaseId/assets"
          $gh_headers["Content-Type"] = "application/octet"
          Invoke-RestMethod -Method POST `
              -Uri "$($url)?name=$($uploadName)" `
              -Headers $gh_headers `
              -InFile $file

  notify-results:
    name: Notify Build Results
    runs-on: ubuntu-latest
    needs: [build-template, generate-package-sbom, generate-package-provenance, publish-template-package]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Notify Slack on failure
        if: contains(needs.*.result, 'failure')
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d #v2.0.0
        with:
          payload: |
            {
              "text": "❌ Scheduled Populated Template build failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ Scheduled Populated Template build failed\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Workflow:* ${{ github.workflow }}\n*Log URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
