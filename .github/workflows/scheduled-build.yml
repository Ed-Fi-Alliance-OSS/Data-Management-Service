name: Scheduled Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 6" # Scheduled the job to run every Saturday at 8 AM UTC

permissions: read-all

env:
  CONFIGURATION: "Release"

jobs:
  visual-studio-build:
    name: Build DMS with Visual Studio MSBuild
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-visual-studio-${{ hashFiles('src/Directory.Packages.props', 'src/dms/Directory.Build.targets', 'src/dms/**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-visual-studio-
            ${{ runner.os }}-nuget-

      - name: Build DMS solution with Visual Studio MSBuild
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $vswherePath = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswherePath)) {
              throw "vswhere.exe was not found at '$vswherePath'."
          }

          $visualStudioInstallations = @(
              & $vswherePath `
                  -latest `
                  -products * `
                  -requires Microsoft.Component.MSBuild `
                  -format json `
                  | ConvertFrom-Json
          )
          if ($visualStudioInstallations.Count -ne 1) {
              throw "Expected one Visual Studio installation with MSBuild, but found $($visualStudioInstallations.Count)."
          }

          $visualStudio = $visualStudioInstallations[0]
          $msbuildPath = Join-Path $visualStudio.installationPath "MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path -LiteralPath $msbuildPath)) {
              throw "MSBuild.exe was not found at '$msbuildPath'."
          }

          $frontendProjectPath = Join-Path $env:GITHUB_WORKSPACE "src\dms\frontend\EdFi.DataManagementService.Frontend.AspNetCore\EdFi.DataManagementService.Frontend.AspNetCore.csproj"
          $solutionPath = Join-Path $env:GITHUB_WORKSPACE "src\dms\EdFi.DataManagementService.sln"

          Write-Host "Runner image: $env:ImageOS $env:ImageVersion"
          Write-Host "Visual Studio: $($visualStudio.displayName) $($visualStudio.catalog.productDisplayVersion)"
          Write-Host "Visual Studio path: $($visualStudio.installationPath)"
          Write-Host "MSBuild path: $msbuildPath"
          & $msbuildPath -nologo -version

          $dotnetSdks = @(dotnet --list-sdks)
          $dotnetSdks | ForEach-Object { Write-Host ".NET SDK: $_" }
          if (-not ($dotnetSdks -match '^10\.0\.')) {
              throw "The runner does not have a .NET 10 SDK."
          }

          $msbuildRuntimeType = (
              & $msbuildPath $frontendProjectPath -nologo -getProperty:MSBuildRuntimeType
              | Out-String
          ).Trim()
          if ($msbuildRuntimeType -ne "Full") {
              throw "Expected Visual Studio full-framework MSBuild runtime type 'Full', but found '$msbuildRuntimeType'."
          }
          Write-Host "MSBuild runtime type: $msbuildRuntimeType"

          & $msbuildPath `
              $solutionPath `
              -restore `
              -m `
              -nr:false `
              -nologo `
              -verbosity:minimal `
              -property:Configuration=$env:CONFIGURATION

  build-and-test:
    name: Build and Run Tests (${{ matrix.identityprovider }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        identityprovider: [keycloak, self-contained]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/dms/Dockerfile', 'src/dms/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: DMS Build - IdentityProvider (${{matrix.identityprovider}})
        id: build_step
        run: ./build-dms.ps1 Build -Configuration ${{ env.CONFIGURATION }} -IdentityProvider ${{matrix.identityprovider}} -LockedMode

      - name: Restore .NET tools
        if: success()
        run: dotnet tool restore

      - name: Run DMS Unit Tests
        id: unit_test_step
        run: ./build-dms.ps1 UnitTest -Configuration ${{ env.CONFIGURATION }}

      - name: Run DMS End to End Tests - IdentityProvider (${{ matrix.identityprovider }})
        id: e2e
        if: success()
        continue-on-error: true
        # This lane runs against the default DS 5.2 stack, so exclude the DS 6.1 version-coupled
        # scenarios (@StandardVersion-6_1); those are covered on every PR by the run-e2e-tests-ds61
        # lane and in full by the scheduled smoke test workflow. The non-empty filter makes
        # build-dms.ps1 write the ...E2E.filtered.trx result file (see the upload step below).
        run: ./build-dms.ps1 E2ETest -Configuration ${{ env.CONFIGURATION }} -SkipDockerBuild -IdentityProvider ${{ matrix.identityprovider }} -EnvironmentFile './.env.e2e' -TestFilter 'Category!=@StandardVersion-6_1'

      - name: Export DMS E2E Docker Logs
        if: always() && steps.e2e.outcome == 'failure'
        run: |
          $logDir = "${{ github.workspace }}/logs/e2e"
          Remove-Item -Path $logDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          $containers = @(docker ps -a --format "{{.Names}}" | Sort-Object)

          if ($containers.Count -eq 0) {
              Write-Host "No Docker containers found for log export."
              exit 0
          }

          foreach ($container in $containers) {
              $logPath = Join-Path $logDir "$container.log"
              docker logs $container > $logPath 2>&1
          }

      - name: Upload DMS E2E Logs
        if: always() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: scheduled-build-logs-${{ matrix.identityprovider }}-e2e
          path: |
            ${{ github.workspace }}/logs/e2e
          retention-days: 10

      - name: Upload DMS End to End Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: scheduled-build-e2e-results-${{ matrix.identityprovider }}
          path: TestResults/EdFi.DataManagementService.Tests.E2E.filtered.trx
          if-no-files-found: ignore

      - name: Fail if DMS E2E failed
        if: always() && steps.e2e.outcome == 'failure'
        run: |
          Write-Host "DMS E2E outcome: ${{ steps.e2e.outcome }}"
          throw "DMS E2E failed."

  build-and-start-dms:
    name: Build and Start DMS, Download OpenAPI Specs
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/dms/Dockerfile', 'src/dms/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: ./build-dms.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Start DMS Docker
        run: |
          ./start-local-dms.ps1 -EnvironmentFile "./.env.e2e" -EnableConfig -r
        working-directory: eng/docker-compose/

      # Legacy DLL-backed flow (no bootstrap manifest, non-bootstrap compatibility): the claims-ready
      # gate does not apply, and the DMS container restarts until this data store exists
      # (restart: unless-stopped).
      - name: Configure DMS Data Store
        run: |
          ./configure-local-data-store.ps1 -EnvironmentFile "./.env.e2e"
        working-directory: eng/docker-compose/

      - name: Wait for DMS to be ready
        run: |
          $maxAttempts = 10
          $attempt = 0
          $ready = $false

          while (-not $ready -and $attempt -lt $maxAttempts) {
            $attempt++
            Write-Host "Waiting for DMS to be ready (attempt $attempt/$maxAttempts)..."

            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/resources-spec.json" -Method Get -TimeoutSec 5 -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                $ready = $true
                Write-Host "DMS is ready!"
              }
            }
            catch {
              Write-Host "DMS not ready yet: $_"
              Start-Sleep -Seconds 10
            }
          }

          if (-not $ready) {
            throw "DMS did not become ready within the timeout period"
          }

      - name: Download OpenAPI specs
        run: |
          mkdir specs
          Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/resources-spec.json" -OutFile "specs/resources-spec.json"
          Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/descriptors-spec.json" -OutFile "specs/descriptors-spec.json"
          Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/discovery-spec.json" -OutFile "specs/discovery-spec.json"

      - name: Upload Resources Spec
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: resources-spec
          path: specs/resources-spec.json

      - name: Upload Descriptors Spec
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: descriptors-spec
          path: specs/descriptors-spec.json

      - name: Upload Discovery Spec
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: discovery-spec
          path: specs/discovery-spec.json

  validate-resources-spec:
    name: Validate Resources Spec
    runs-on: ubuntu-latest
    needs: build-and-start-dms
    services:
      swagger-editor:
        image: swaggerapi/swagger-editor:v4.14.8
        ports:
          - 80:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
    steps:
      - name: Download Resources Spec from artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: resources-spec
          path: specs

      - name: Validate Resources Spec downloaded
        uses: swaggerexpert/swagger-editor-validate@54b85e2f5c1fcdee85308dd57cad8c8ec19d3970
        with:
          swagger-editor-url: http://localhost/
          definition-file: specs/resources-spec.json
          default-timeout: 45000

  validate-descriptors-spec:
    name: Validate Descriptors Spec
    runs-on: ubuntu-latest
    needs: build-and-start-dms
    services:
      swagger-editor:
        image: swaggerapi/swagger-editor:v4.14.8
        ports:
          - 80:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
    steps:
      - name: Download Descriptors Spec from artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: descriptors-spec
          path: specs

      - name: Validate Descriptors Spec downloaded
        uses: swaggerexpert/swagger-editor-validate@54b85e2f5c1fcdee85308dd57cad8c8ec19d3970
        with:
          swagger-editor-url: http://localhost/
          definition-file: specs/descriptors-spec.json
          default-timeout: 45000

  validate-discovery-spec:
    name: Validate Discovery Spec
    runs-on: ubuntu-latest
    needs: build-and-start-dms
    services:
      swagger-editor:
        image: swaggerapi/swagger-editor:v4.14.8
        ports:
          - 80:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
    steps:
      - name: Download Discovery Spec from artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: discovery-spec
          path: specs

      - name: Validate Discovery Spec downloaded
        uses: swaggerexpert/swagger-editor-validate@54b85e2f5c1fcdee85308dd57cad8c8ec19d3970
        with:
          swagger-editor-url: http://localhost/
          definition-file: specs/discovery-spec.json
          default-timeout: 45000

