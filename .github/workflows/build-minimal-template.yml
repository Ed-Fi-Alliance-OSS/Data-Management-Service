# Reusable build pipeline for the Minimal database template package. Mirrors
# build-populated-template.yml so the thin caller (EdFi.Api.Minimal.Template.PostgreSQL.yml)
# can run one matrix leg per Ed-Fi Data Standard version with per-version outputs (package,
# SBOM, provenance) staying correlated within a single reusable-workflow run. The minimal
# template is relational backend only and loads only the descriptor (minimal) sample data.

name: Build Minimal Template Package

on:
  workflow_call:
    inputs:
      standard_version:
        description: "Ed-Fi Data Standard version"
        required: true
        type: string
      package_name:
        description: "Package name"
        required: true
        type: string
      manifest_file:
        description: "Manifest file path"
        required: true
        type: string
      provenance_file:
        description: "Provenance file name"
        required: true
        type: string
      publish_package:
        description: "Publish the built minimal template package to the Azure Artifacts feed"
        required: false
        type: boolean
        default: true
      environment_file:
        description: "Docker compose environment file used to start/provision the stack"
        required: false
        type: string
        default: "./.env.template"
      # The built package's data dump is coupled to an engine image line: the mssql .bak
      # backup is coupled to the mcr.microsoft.com/mssql/server:2022-latest image used to create
      # and restore it (a moving tag tracking the latest SQL Server 2022 build; the coupling is
      # at the SQL Server 2022 level, not an exact build), the same way the postgresql .sql dump
      # is coupled to the PostgreSQL major version it was built and restored against.
      database_engine:
        description: "Database engine for the relational template datastore (postgresql or mssql)"
        required: false
        type: string
        default: "postgresql"
    secrets:
      AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN:
        required: true
      AZURE_ARTIFACTS_USER_NAME:
        # Consumed only on the release-promotion path (env.ARTIFACTS_USERNAME); restore uses the PAT
        # alone. Optional so non-publishing callers and forks without the secret do not hard-fail.
        required: false
    outputs:
      hash-code:
        description: "Hash code of the built package"
        value: ${{ jobs.build-template.outputs.hash-code }}
      dms-version:
        description: "DMS version"
        value: ${{ jobs.build-template.outputs.dms-version }}
      sbom-hash-code:
        description: "SBOM hash code"
        value: ${{ jobs.generate-package-sbom.outputs.sbom-hash-code }}

env:
  ARTIFACTS_FEED_URL: ${{ vars.AZURE_ARTIFACTS_FEED_URL }}
  ARTIFACTS_PACKAGES_URL: ${{ vars.ARTIFACTS_PACKAGES_URL }}
  ARTIFACTS_USERNAME: ${{ secrets.AZURE_ARTIFACTS_USER_NAME }}
  ARTIFACTS_API_KEY: ${{ secrets.AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN }}
  VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: '{"endpointCredentials": [{"endpoint": "https://pkgs.dev.azure.com/ed-fi-alliance/Ed-Fi-Alliance-OSS/_packaging/EdFi/nuget/v3/index.json","password": "${{ secrets.AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN }}"}]}'

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build-template:
    name: Build Minimal Template Package
    if: ${{ github.event_name != 'release' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    outputs:
      hash-code: ${{ steps.hash-code.outputs.hash-code }}
      dms-version: ${{ steps.versions.outputs.dms-v }}
    steps:
      - name: Validate workflow inputs
        env:
          DATABASE_ENGINE: ${{ inputs.database_engine }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          $databaseEngine = $env:DATABASE_ENGINE
          $packageName = $env:PACKAGE_NAME

          $databaseEngines = @('postgresql', 'mssql')
          if ($databaseEngine -notin $databaseEngines) {
            throw "database_engine must be one of: $($databaseEngines -join ', '); got '$databaseEngine'."
          }

          # Minimal template package names are engine-dependent so a build cannot silently
          # publish an MSSQL dump under the PostgreSQL product name, or vice versa.
          $expectedPackagePrefix = if ($databaseEngine -eq 'mssql') { 'EdFi.Api.Minimal.Template.MsSql' } else { 'EdFi.Api.Minimal.Template.PostgreSql' }
          # Anchored to prefix + dotted numeric version: a prefix-only -like check lets a
          # malformed name (e.g. an engine token with trailing junk) pass here and fail much
          # later during artifact/SBOM lookup.
          if ($packageName -notmatch "^$([regex]::Escape($expectedPackagePrefix))\.\d+(\.\d+)+$") {
            throw "database_engine '$databaseEngine' requires a package_name of the form '$expectedPackagePrefix.<version>'; got '$packageName'."
          }

      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Checkout Ed-Fi-Data-Standard
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Ed-Fi-Alliance-OSS/Ed-Fi-Data-Standard
          path: Ed-Fi-Data-Standard/
          ref: v${{ inputs.standard_version }} # Added v prefix to match the tag format

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Resolve relational database name
        run: |
          Import-Module ./env-utility.psm1 -Force
          $envValues = ReadValuesFromEnvFile "${{ inputs.environment_file }}"
          $relationalDatabaseName = [string]$envValues["E2E_DATABASE_NAME"]
          if ([string]::IsNullOrWhiteSpace($relationalDatabaseName)) {
            throw "E2E_DATABASE_NAME must be set in ${{ inputs.environment_file }}"
          }
          "RELATIONAL_DB_NAME=$relationalDatabaseName" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: eng/docker-compose/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/dms/Dockerfile', 'src/dms/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Set Version Numbers
        id: versions
        run: |
          Import-Module ./package-helpers.psm1
          Get-VersionNumber -projectPrefix "dms" # Match the DMS version

      - name: Start DMS Docker
        run: |
          $env:LOG_LEVEL="Warning"
          ./start-local-dms.ps1 -EnvironmentFile "${{ inputs.environment_file }}" -EnableConfig -DatabaseEngine "${{ inputs.database_engine }}"
        working-directory: eng/docker-compose/

      - name: Provision relational database
        run: |
          ./provision-e2e-database.ps1 -EnvironmentFile "${{ inputs.environment_file }}" -Configuration Release -DatabaseEngine "${{ inputs.database_engine }}"
        working-directory: eng/docker-compose/

      # DMS fails fatally at startup when the Configuration Service has no data stores.
      # No data store is created by default; register the single relational data store here
      # and hand its id forward; the Configuration Service protects data store connection
      # strings in API responses, so the id from registration is the only reliable way to
      # select this data store later.
      - name: Register relational data store
        run: |
          Import-Module ../Dms-Management.psm1 -Force
          Import-Module ./env-utility.psm1 -Force
          $envValues = ReadValuesFromEnvFile "${{ inputs.environment_file }}"
          $postgresUser = Get-EnvValue -EnvValues $envValues -Name "POSTGRES_USER" -DefaultValue "postgres"
          $postgresCredential = ConvertTo-PostgresCredential -UserName $postgresUser -Secret $envValues.POSTGRES_PASSWORD

          # Add-DataStore always requires a PostgresCredential; for mssql it goes unused
          # because -ConnectionString is supplied verbatim below. On the mssql leg the
          # Configuration Service also runs on SQL Server (shared-database topology; no
          # PostgreSQL container exists), so the credential is a required-parameter placeholder
          # there, built from env values that are present in the template env file either way.
          $dataStoreConnectionString = ""
          if ("${{ inputs.database_engine }}" -eq "mssql") {
            $mssqlPassword = Get-EnvValue -EnvValues $envValues -Name "MSSQL_SA_PASSWORD" -DefaultValue "abcdefgh1!"
            $dataStoreConnectionString = New-DataStoreConnectionString -DatabaseEngine "mssql" -DbHost "dms-mssql" -Port 1433 -Username "sa" -Password $mssqlPassword -DatabaseName $env:RELATIONAL_DB_NAME
          }

          Add-CmsClient -CmsUrl "http://localhost:8081" -ClientId "data-store-admin" -ClientSecret "ValidClientSecret1234567890!Abcd" -DisplayName "Data Store Setup Administrator"
          $configToken = Get-CmsToken -CmsUrl "http://localhost:8081" -ClientId "data-store-admin" -ClientSecret "ValidClientSecret1234567890!Abcd"
          $dataStoreId = Add-DataStore -CmsUrl "http://localhost:8081" -AccessToken $configToken -PostgresCredential $postgresCredential -PostgresDbName $env:RELATIONAL_DB_NAME -ConnectionString $dataStoreConnectionString -Name "Relational Template Data Store" -DataStoreType "Template"
          if (-not $dataStoreId) {
            throw "Failed to register the relational data store."
          }
          "RELATIONAL_DATA_STORE_ID=$dataStoreId" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: eng/docker-compose/

      - name: Restart DMS to load the provisioned relational schema
        run: |
          docker restart ed-fi-api

      - name: Wait for DMS to be ready
        run: |
          $maxAttempts = 30
          $attempt = 0
          $ready = $false

          while (-not $ready -and $attempt -lt $maxAttempts) {
            $attempt++
            Write-Host "Waiting for DMS to be ready (attempt $attempt/$maxAttempts)..."

            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/resources-spec.json" -Method Get -TimeoutSec 5 -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                $ready = $true
                Write-Host "DMS is ready!"
              }
            }
            catch {
              Write-Host "DMS not ready yet: $_"
              Start-Sleep -Seconds 10
            }
          }

          if (-not $ready) {
            throw "DMS did not become ready within the timeout period"
          }

      - name: Generate Minimal Template package
        run: |
          Import-Module ./Template-Management.psm1 -Force

          # Generate unique application name for this run
          $uniqueAppName = "Demo application ${{ github.run_id }}"

          $packageVersion = "${{ steps.versions.outputs.dms-semver }}" -replace "dms-v", ""
          Build-Template `
                  -TemplateType Minimal `
                  -DmsUrl 'http://localhost:8080' `
                  -CmsUrl 'http://localhost:8081' `
                  -MinimalSampleDataDirectory '${{ github.workspace }}/Ed-Fi-Data-Standard/Descriptors' `
                  -Extension 'ed-fi'`
                  -ConfigFilePath './MinimalTemplateSettings.psd1' `
                  -StandardVersion '${{ inputs.standard_version }}'`
                  -PackageVersion $packageVersion `
                  -ApplicationName $uniqueAppName `
                  -DataStoreDatabaseName $env:RELATIONAL_DB_NAME `
                  -DataStoreId $env:RELATIONAL_DATA_STORE_ID `
                  -DumpAllUserSchemas `
                  -DatabaseEngine '${{ inputs.database_engine }}'
        working-directory: eng/DatabaseTemplates/

      # A loader that exits 0 does not guarantee it wrote anything: gate on descriptor content
      # here, before the package is uploaded or published, so an empty bulk load cannot slip
      # through as a "minimal" template. Minimal templates load only descriptor sample data
      # (no sample entities), so dms.Descriptor is the content this template type owns.
      - name: Gate on descriptor content before packaging
        env:
          DATABASE_ENGINE: ${{ inputs.database_engine }}
          ENVIRONMENT_FILE: ${{ inputs.environment_file }}
        run: |
          Import-Module ./env-utility.psm1 -Force
          $envValues = ReadValuesFromEnvFile $env:ENVIRONMENT_FILE

          if ($env:DATABASE_ENGINE -eq "mssql") {
            $mssqlPassword = Get-EnvValue -EnvValues $envValues -Name "MSSQL_SA_PASSWORD" -DefaultValue "abcdefgh1!"
            $query = "SET NOCOUNT ON; SELECT COUNT(*) FROM [dms].[Descriptor];"
            $rawOutput = & docker exec dms-mssql /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $mssqlPassword -d $env:RELATIONAL_DB_NAME -C -b -h -1 -W -Q $query
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to query dms.Descriptor row count from database '$($env:RELATIONAL_DB_NAME)'."
            }
            $descriptorCount = [long](@($rawOutput) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1)
          }
          else {
            $rawOutput = & docker exec dms-postgresql psql -U postgres -d $env:RELATIONAL_DB_NAME -tA -c 'SELECT COUNT(*) FROM dms."Descriptor";'
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to query dms.Descriptor row count from database '$($env:RELATIONAL_DB_NAME)'."
            }
            $descriptorCount = [long](@($rawOutput) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 1)
          }

          if ($descriptorCount -lt 1) {
            throw "Descriptor content gate failed: dms.Descriptor has $descriptorCount row(s) in database '$($env:RELATIONAL_DB_NAME)'; the bulk load did not populate descriptor data."
          }

          Write-Host "Descriptor content gate passed: dms.Descriptor has $descriptorCount row(s)." -ForegroundColor Green
        working-directory: eng/docker-compose/

      - name: Verify template package restore
        run: |
          ./verify-template-restore.ps1 -SourceDatabaseName $env:RELATIONAL_DB_NAME -DatabaseEngine '${{ inputs.database_engine }}'
        working-directory: eng/DatabaseTemplates/

      - name: Upload Bulk Load Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Bulkload-logs
          path: ${{ github.workspace }}/eng/DatabaseTemplates/.packages/**/logfile.txt
          retention-days: 10

      - name: Export Docker Logs
        if: failure()
        run: |
          $logDir = "${{ github.workspace }}/logs"
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          docker ps --format "{{.Names}}" | ForEach-Object {
              $container = $_
              $logPath = Join-Path $logDir "$container.log"
              docker logs $container > $logPath
          }
        shell: pwsh

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Docker-Logs
          path: ${{ github.workspace }}/logs
          retention-days: 10

      - name: Generate hash for NuGet package
        id: hash-code
        run: |
          "hash-code=$(sha256sum *.nupkg | base64 -w0)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        working-directory: eng/DatabaseTemplates/

      - name: Upload Minimal Template Package as Artifact
        if: success()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: "${{ inputs.package_name }}-NuGet"
          path: ${{ github.workspace }}/eng/DatabaseTemplates/*.nupkg
          if-no-files-found: error
          retention-days: 30

  generate-package-sbom:
    name: Create Minimal Template SBOM
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    needs: build-template
    permissions:
      actions: read
      contents: write
    outputs:
      sbom-hash-code: ${{ steps.sbom-hash-code.outputs.sbom-hash-code }}
    steps:
      - name: Get Minimal Template Package Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: ${{ inputs.package_name }}-NuGet

      - name: Generate Minimal Template Software Bill of Materials (SBOM)
        run: |
          $packageName = "${{ inputs.package_name }}"
          $version = "${{ needs.build-template.outputs.dms-version }}"

          Get-ChildItem -Include "$packageName.*.nupkg" -Recurse | ForEach-Object { $_.FullName } > buildfilelist.txt

          dotnet tool install --global Microsoft.Sbom.DotNetTool

          sbom-tool generate `
              -b ./ `
              -bl ./buildfilelist.txt `
              -bc "./" `
              -pn "$packageName" `
              -pv $version `
              -nsb https://ed-fi.org `
              -m ./ `
              -ps "Ed-Fi Alliance"

          cp _manifest/spdx_2.2/manifest.spdx.* .

      - name: Upload Minimal Template SBOM
        if: success()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: ${{ inputs.package_name }}-SBOM
          path: ${{ inputs.manifest_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Generate Minimal Template SBOM Hash Code
        id: sbom-hash-code
        shell: bash
        run: |
          # sha256sum returns "<hashcode>  <name of file". Split that and return only the <hashcode>.
          sbom_hash=$(sha256sum ./${{ inputs.manifest_file }} | awk '{split($0,a); print a[1]}')
          echo "sbom-hash-code=$sbom_hash" >> $GITHUB_OUTPUT

  generate-package-provenance:
    name: Create Minimal Template Provenance
    needs: build-template
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: Ed-Fi-Alliance-OSS/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build-template.outputs.hash-code }}
      provenance-name: ${{ inputs.provenance_file }}
      upload-assets: false
      # TODO: remove this after this issue is resolved: https://github.com/slsa-framework/slsa-github-generator/issues/876
      compile-generator: true

  publish-template-package:
    name: Publish Minimal Template Package
    if: ${{ inputs.publish_package }}
    needs:
      - build-template
      - generate-package-sbom
      - generate-package-provenance
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Minimal Template Package Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: ${{ inputs.package_name }}-NuGet

      - name: Install-credential-handler
        run: |
          Import-Module ./package-helpers.psm1
          InstallCredentialHandler

      - name: Push Minimal Template Package to Azure
        run: |
          $artifact = (Get-ChildItem -Name -Include *.nupkg)
          $arguments = @{
            EdFiNuGetFeed = "${{ env.ARTIFACTS_FEED_URL }}"
            NuGetApiKey = "${{ env.ARTIFACTS_API_KEY }}"
          }

          $artifact | ForEach-Object {
              $arguments.PackageFile = $_
              ./build-dms.ps1 Push @arguments
           }

  promote-azure-package:
    name: Promote Azure Package
    if: ${{ github.event_name == 'release'  }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Promote Minimal Template Azure Package
        run: |
          $arguments = @{
            PackagesURL = "${{ env.ARTIFACTS_PACKAGES_URL }}"
            Username    = "${{ env.ARTIFACTS_USERNAME }}"
            ViewId      = "release"
            ReleaseRef  = "${{ github.ref_name }}"
            Password    = (ConvertTo-SecureString -String "${{ env.ARTIFACTS_API_KEY }}" -AsPlainText -Force)
            PackageName = "${{ inputs.package_name }}"
          }

          Import-Module ./package-helpers.psm1
          Invoke-Promote @arguments

  attach-sbom-and-provenance-to-release:
    name: Attach Minimal Template SBOM and Provenance to GitHub Release
    runs-on: ubuntu-latest
    needs:
      - generate-package-sbom
      - generate-package-provenance
    if: ${{ startsWith(github.ref, 'refs/tags/') }} # Only run on releases
    permissions:
      contents: write
    steps:
      - name: Download SBOM Artifact
        uses: Ed-Fi-Alliance-OSS/slsa-github-generator/.github/actions/secure-download-artifact@v2.0.0
        with:
          name: "${{ inputs.package_name }}-SBOM"
          path: ${{ inputs.manifest_file }}
          sha256: "${{ needs.generate-package-sbom.outputs.sbom-hash-code }}"

      - name: Download Provenance Artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: ${{ inputs.provenance_file }}

      - name: Attach SBOM to Release
        shell: pwsh
        run: |
          $release = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $file = "${{ inputs.manifest_file }}"
          $uploadName = "${{ inputs.package_name }}-SBOM.zip"

          $url = "https://api.github.com/repos/$repo/releases/tags/$release"
          $gh_headers = @{
              "Accept"        = "application/vnd.github+json"
              "Authorization" = "Bearer $token"
          }
          $response = Invoke-RestMethod -Uri $url -Headers $gh_headers
          $releaseId = $response.id

          Compress-Archive $file -DestinationPath $uploadName
          $url = "https://uploads.github.com/repos/$repo/releases/$releaseId/assets"
          $gh_headers["Content-Type"] = "application/octet"
          Invoke-RestMethod -Method POST `
              -Uri "$($url)?name=$($uploadName)" `
              -Headers $gh_headers `
              -InFile $uploadName

      - name: Attach Provenance to Release
        shell: pwsh
        run: |
          $release = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $file = "${{ inputs.provenance_file }}"
          $uploadName = "${{ inputs.provenance_file }}"

          $url = "https://api.github.com/repos/$repo/releases/tags/$release"
          $gh_headers = @{
              "Accept"        = "application/vnd.github+json"
              "Authorization" = "Bearer $token"
          }
          $response = Invoke-RestMethod -Uri $url -Headers $gh_headers
          $releaseId = $response.id
          $url = "https://uploads.github.com/repos/$repo/releases/$releaseId/assets"
          $gh_headers["Content-Type"] = "application/octet"
          Invoke-RestMethod -Method POST `
              -Uri "$($url)?name=$($uploadName)" `
              -Headers $gh_headers `
              -InFile $file
