name: On Config Pull Request

on:
  push:
    # Running on push to main to support CodeQL on C#
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-config.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/nuget.config"
      - "src/config/**"

  # No paths filter here (unlike push above): the merge queue requires an aggregate status
  # check (config-ci-gate) that must report on every pull request, so this workflow runs for
  # all PRs regardless of which files changed. detect-fresh-build-changes computes
  # config_relevant and the heavy jobs skip when no config-relevant file changed, so idle PRs
  # stay cheap and the gate still reports (a skipped dependency counts as a pass).
  pull_request:
    branches:
      - main

  merge_group:
    types:
      - checks_requested

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: "Release"

permissions: read-all

jobs:
  detect-fresh-build-changes:
    name: Detect Fresh Build Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      fresh_build_required: ${{ steps.detect.outputs.fresh_build_required }}
      # True when the pull request changed a file relevant to config validation. The heavy
      # jobs gate on this so that a PR touching only unrelated areas (e.g. DMS-only) skips the
      # config suite while this workflow still runs and reports config-ci-gate.
      config_relevant: ${{ steps.detect.outputs.config_relevant }}
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect files that require a fresh rebuild
        id: detect
        shell: bash
        run: |
          # emit <fresh_build_required> <config_relevant>
          emit() {
            echo "fresh_build_required=$1" >> "$GITHUB_OUTPUT"
            echo "config_relevant=$2" >> "$GITHUB_OUTPUT"
          }

          # Non-pull_request events (push, merge_group, workflow_dispatch) always run the full
          # suite, so config_relevant is reported true and only fresh_build_required matters.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            emit true true
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            changed_files="$(git diff --no-renames --name-only "origin/${{ github.base_ref }}...HEAD")"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            base_sha="${{ github.event.merge_group.base_sha }}"

            if [[ -z "$base_sha" ]] || ! changed_files="$(git diff --no-renames --name-only "$base_sha" "${{ github.sha }}")"; then
              emit true true
              exit 0
            fi
          else
            before="${{ github.event.before }}"

            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --no-renames --name-only -r HEAD)"
            else
              changed_files="$(git diff --no-renames --name-only "$before" "${{ github.sha }}")"
            fi
          fi

          fresh_build_required=false
          # For merge_group and push, force config_relevant true so nothing is skipped when
          # validating the merged result; only pull_request narrows to the changed area.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            config_relevant=false
          else
            config_relevant=true
          fi

          while IFS= read -r file; do
            case "$file" in
              src/Directory.Packages.props|src/nuget.config|src/config/Dockerfile|eng/docker-compose/*)
                fresh_build_required=true
                ;;
            esac
            case "$file" in
              .github/workflows/*|build-config.ps1|eng/*|src/Directory.Packages.props|src/nuget.config|src/config/*)
                config_relevant=true
                ;;
            esac
          done <<< "$changed_files"

          emit "$fresh_build_required" "$config_relevant"

  scan-actions-bidi:
    name: Scan Actions, scan all files for BIDI Trojan Attacks
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    uses: Ed-Fi-Alliance-OSS/Ed-Fi-Actions/.github/workflows/repository-scanner.yml@main
    with:
      config-file-path: ./.github/workflows/bidi-config.json

  verify-lock-files:
    name: Verify Config Lock Files
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore with locked mode
        run: dotnet restore ./src/config/EdFi.DmsConfigurationService.sln --locked-mode

  run-parity-pester-tests:
    name: Run Lock File Parity Tests
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        run: Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force

      - name: Run Lock File Parity Tests
        run: |
          $result = Invoke-Pester -Path "eng/docker-compose/tests/LockFileParity.Tests.ps1" -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) lock-file parity test(s) failed."
          }

      - name: Run OpenIddict Crypto Tests
        run: |
          $result = Invoke-Pester -Path "eng/docker-compose/tests/OpenIddictCrypto.Tests.ps1" -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) OpenIddict crypto test(s) failed."
          }

  run-unit-tests:
    name: Run Unit Tests
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Restore .NET tools
        if: success()
        run: dotnet tool restore

      - name: Run Unit Tests
        run: ./build-config.ps1 UnitTest -Configuration ${{ env.CONFIGURATION }}

      - name: Generate Coverage Report
        if: ${{ hashFiles('coverage.cobertura.xml') != '' }}
        run: ./build-config.ps1 Coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Coverage Report
          path: coveragereport

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Unit Test Results
          overwrite: true
          path: |
            **/*.trx

  run-integration-tests:
    name: Run Integration Tests
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    services:
      postgres:
        image: postgres:16.3-alpine
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
      mssql:
        image: mcr.microsoft.com/mssql/server:2025-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: IntegrationTest1!
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'IntegrationTest1!' -C -Q 'SELECT 1' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Run Integration Tests
        if: success()
        run: ./build-config.ps1 IntegrationTest -Configuration ${{ env.CONFIGURATION }}
        env:
          ConnectionStrings__MssqlAdmin: "Server=localhost,1433;User Id=sa;Password=IntegrationTest1!;TrustServerCertificate=true"

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Integration Test Results
          overwrite: true
          path: |
            **/*.trx

  run-e2e-tests:
    name: Run E2E Tests
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      matrix:
        identityprovider: [keycloak, self-contained]
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/nuget.config', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Config Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-config-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }} -IdentityProvider ${{matrix.identityprovider}}

      - name: Run End to End Tests - IdentityProvider (${{matrix.identityprovider}})
        if: success()
        run: ./build-config.ps1 E2ETest  -Configuration ${{ env.CONFIGURATION }} -SkipDockerBuild -IdentityProvider ${{matrix.identityprovider}}

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: test-logs
          path: |
            ./src/services/EdFi.DmsConfigurationService.Api.Tests.E2E/bin/Release/net10.0/logs
          retention-days: 10

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: E2E Test Results
          overwrite: true
          path: |
            **/*.trx

  run-e2e-tests-mssql:
    name: Run E2E Tests - MSSQL
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      matrix:
        identityprovider: [keycloak, self-contained]
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/nuget.config', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Config Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-config-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }} -IdentityProvider ${{matrix.identityprovider}}

      - name: Run End to End Tests - MSSQL - IdentityProvider (${{matrix.identityprovider}})
        if: success()
        run: ./build-config.ps1 E2ETest -Configuration ${{ env.CONFIGURATION }} -SkipDockerBuild -IdentityProvider ${{matrix.identityprovider}} -EnvironmentFile "./.env.config.mssql.e2e" -E2ETestFilter "TestCategory=MssqlRepresentative"

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: test-logs
          path: |
            ./src/services/EdFi.DmsConfigurationService.Api.Tests.E2E/bin/Release/net10.0/logs
          retention-days: 10

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: E2E MSSQL Test Results
          overwrite: true
          path: |
            **/*.trx

  run-e2e-tests-mssql-multitenant:
    name: Run E2E Tests - MSSQL Multitenant
    needs: detect-fresh-build-changes
    if: >-
      github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      matrix:
        identityprovider: [keycloak, self-contained]
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/nuget.config', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Config Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-config-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }} -IdentityProvider ${{matrix.identityprovider}}

      - name: Run End to End Tests - MSSQL Multitenant - IdentityProvider (${{matrix.identityprovider}})
        if: success()
        run: ./build-config.ps1 E2ETest -Configuration ${{ env.CONFIGURATION }} -SkipDockerBuild -IdentityProvider ${{matrix.identityprovider}} -EnvironmentFile "./.env.config.mssql.multitenant.e2e" -E2ETestFilter "TestCategory=MssqlMultitenantRepresentative"

      - name: Collect Logs
        if: failure()
        run: |
          $logPath = "./TestResults/mssql-multitenant-logs-${{ matrix.identityprovider }}"
          New-Item -ItemType Directory -Force -Path $logPath | Out-Null
          docker ps -a *>&1 | Out-File -FilePath (Join-Path $logPath "docker-ps.txt") -Encoding utf8
          $containerNames = docker ps -a --format "{{.Names}}"
          foreach ($containerName in $containerNames) {
              if ($containerName -in @("ed-fi-api-config-service", "dms-mssql", "dms-keycloak") -or $containerName -like "cs-local*") {
                  docker logs $containerName *>&1 | Out-File -FilePath (Join-Path $logPath "$containerName.log") -Encoding utf8
              }
          }

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: test-logs-mssql-multitenant-${{ matrix.identityprovider }}
          path: |
            ./TestResults/mssql-multitenant-logs-${{ matrix.identityprovider }}
          retention-days: 10

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: E2E MSSQL Multitenant Test Results - ${{ matrix.identityprovider }}
          overwrite: true
          path: |
            **/*.trx

  fresh-rebuild-docker-image:
    name: Fresh Rebuild Config Docker Image
    needs: detect-fresh-build-changes
    if: >-
      needs.detect-fresh-build-changes.outputs.fresh_build_required == 'true' &&
      (github.event_name != 'pull_request' ||
      needs.detect-fresh-build-changes.outputs.config_relevant == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Fresh rebuild Config Docker image
        working-directory: eng/docker-compose
        run: |
          docker compose -f postgresql.yml -f local-config.yml -f keycloak.yml --env-file "./.env.config.e2e" -p cs-local build --no-cache

  event_file:
    name: Upload Event File
    runs-on: ubuntu-latest
    needs: [verify-lock-files, run-parity-pester-tests, run-unit-tests, run-e2e-tests, run-e2e-tests-mssql, run-e2e-tests-mssql-multitenant, run-integration-tests, fresh-rebuild-docker-image]
    if: always()
    steps:
    - name: Upload
      uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
      with:
        name: Event File
        path: ${{ github.event_path }}

  # Single aggregate status check for this workflow. The merge queue merges an entry the
  # moment every required status check passes on the merge-group ref, so without one check
  # that depends on the whole pipeline the queue would satisfy its other required checks and
  # merge while these jobs were still running, cancelling them. Making this the required check
  # forces the queue (and PR merges) to wait for the full pipeline. It runs even when upstream
  # jobs fail, are cancelled, or are skipped, then fails unless every dependency succeeded or
  # was intentionally skipped (a failed prerequisite surfaces directly, so a skipped dependent
  # is safe to treat as a pass). Keep this needs list aligned with the validation and build
  # jobs above; event_file is deliberately omitted so informational tasks can never block a
  # merge.
  config-ci-gate:
    name: Config CI Gate
    needs:
      - detect-fresh-build-changes
      - scan-actions-bidi
      - verify-lock-files
      - run-parity-pester-tests
      - run-unit-tests
      - run-integration-tests
      - run-e2e-tests
      - run-e2e-tests-mssql
      - run-e2e-tests-mssql-multitenant
      - fresh-rebuild-docker-image
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Verify all required jobs succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          $needs = $env:NEEDS_JSON | ConvertFrom-Json
          $failed = [System.Collections.Generic.List[string]]::new()
          foreach ($job in $needs.PSObject.Properties) {
            $result = $job.Value.result
            Write-Host "$($job.Name): $result"
            if ($result -ne 'success' -and $result -ne 'skipped') {
              $failed.Add("$($job.Name) ($result)")
            }
          }
          if ($failed.Count -gt 0) {
            throw "Config CI Gate failed. Required job(s) did not succeed: $($failed -join ', ')."
          }
          Write-Host "All required Config CI jobs succeeded or were skipped."
