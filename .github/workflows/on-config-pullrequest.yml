name: On Config Pull Request

on:
  push:
    # Running on push to main to support CodeQL on C#
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-config.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/config/**"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-config.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/config/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: "Release"

permissions: read-all

jobs:
  detect-fresh-build-changes:
    name: Detect Fresh Build Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      fresh_build_required: ${{ steps.detect.outputs.fresh_build_required }}
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect files that require a fresh rebuild
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "fresh_build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            before="${{ github.event.before }}"

            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            else
              changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
            fi
          fi

          fresh_build_required=false

          while IFS= read -r file; do
            case "$file" in
              src/Directory.Packages.props|src/config/Dockerfile|eng/docker-compose/*)
                fresh_build_required=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "fresh_build_required=$fresh_build_required" >> "$GITHUB_OUTPUT"

  scan-actions-bidi:
    name: Scan Actions, scan all files for BIDI Trojan Attacks
    uses: Ed-Fi-Alliance-OSS/Ed-Fi-Actions/.github/workflows/repository-scanner.yml@main
    with:
      config-file-path: ./.github/workflows/bidi-config.json

  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Install Coverlet Reference
        if: success()
        run: |
          dotnet tool install --global coverlet.console
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Run Unit Tests
        run: ./build-config.ps1 UnitTest -Configuration ${{ env.CONFIGURATION }}

      - name: Generate Coverage Report
        if: ${{ hashFiles('coverage.cobertura.xml') != '' }}
        run: ./build-config.ps1 Coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Coverage Report
          path: coveragereport

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Unit Test Results
          overwrite: true
          path: |
            **/*.trx

  run-integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    services:
      postgres:
        image: postgres:16.3-alpine
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Run Integration Tests
        if: success()
        run: ./build-config.ps1 IntegrationTest -Configuration ${{ env.CONFIGURATION }}

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Integration Test Results
          overwrite: true
          path: |
            **/*.trx

  run-e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      matrix:
        identityprovider: [keycloak, self-contained]
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Config Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: cs-local-config:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: ./build-config.ps1 Build -Configuration ${{ env.CONFIGURATION }} -IdentityProvider ${{matrix.identityprovider}}

      - name: Run End to End Tests - IdentityProvider (${{matrix.identityprovider}})
        if: success()
        run: ./build-config.ps1 E2ETest  -Configuration ${{ env.CONFIGURATION }} -SkipDockerBuild -IdentityProvider ${{matrix.identityprovider}}

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: test-logs
          path: |
            ./src/services/EdFi.DmsConfigurationService.Api.Tests.E2E/bin/Release/net10.0/logs
          retention-days: 10

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: E2E Test Results
          overwrite: true
          path: |
            **/*.trx

  fresh-rebuild-docker-image:
    name: Fresh Rebuild Config Docker Image
    needs: detect-fresh-build-changes
    if: needs.detect-fresh-build-changes.outputs.fresh_build_required == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Fresh rebuild Config Docker image
        working-directory: eng/docker-compose
        run: |
          docker compose -f postgresql.yml -f local-config.yml -f keycloak.yml --env-file "./.env.config.e2e" -p cs-local build --no-cache

  event_file:
    name: Upload Event File
    runs-on: ubuntu-latest
    needs: [run-unit-tests, run-e2e-tests, run-integration-tests, fresh-rebuild-docker-image]
    if: always()
    steps:
    - name: Upload
      uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
      with:
        name: Event File
        path: ${{ github.event_path }}
