name: Scheduled Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 6" # Scheduled the job to run every Saturday at 8 AM UTC
  pull_request:
    paths: # Only run on PRs that change relevant files
      - 'src/Directory.Packages.props'
      - '**/OpenApiDocument.cs'
      # SDK generation + smoke tooling this workflow exercises, so changes to them
      # are covered by PR validation instead of only the cron run (DMS-912).
      - '.github/workflows/scheduled-smoke-test.yml'
      - 'build-sdk.ps1'
      - 'eng/smoke_test/**'
      - 'eng/sdkGen/**'
      # The populated-template build this workflow consumes per Data Standard version: its reusable
      # workflow, the per-version smoke template env files, and the template build/restore/filtering
      # logic (incl. the DS 6.1 educator-prep filter + tolerance). Listed so a change to the DS 6.1
      # (or 5.2) smoke path is validated on PRs instead of only the cron run (DMS-1136).
      - '.github/workflows/build-populated-template.yml'
      - 'eng/docker-compose/.env.smoke*'
      - 'eng/DatabaseTemplates/**'

permissions:
  contents: write
  actions: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-populated-template:
    name: Build Populated Template ${{ matrix.standard_version }}
    # One leg per supported Ed-Fi Data Standard version (kept in sync with the smoke-test
    # matrix below). To add or drop a version, edit both `include` blocks; see
    # docs/DATA-STANDARD-VERSIONS.md. DS 5.2 is the default.
    strategy:
      fail-fast: false
      matrix:
        include:
          - standard_version: "5.2.0"
            package_name: "EdFi.Api.Smoke.Template.PostgreSql.5.2.0"
            provenance_file: "populated.template.intoto.jsonl"
            environment_file: "./.env.smoke"
          - standard_version: "6.1.0"
            package_name: "EdFi.Api.Smoke.Template.PostgreSql.6.1.0"
            provenance_file: "populated.template.6.1.0.intoto.jsonl"
            environment_file: "./.env.smoke.ds61"
    uses: ./.github/workflows/build-populated-template.yml
    with:
      standard_version: ${{ matrix.standard_version }}
      package_name: ${{ matrix.package_name }}
      manifest_file: "_manifest/spdx_2.2/manifest.spdx.json"
      provenance_file: ${{ matrix.provenance_file }}
      # The smoke test consumes the template artifact built in this run; nothing is
      # published to the package feed from the smoke path. Feed publishing stays with
      # the template package workflows (tag/release and explicit dispatch opt-in).
      publish_package: false
      environment_file: ${{ matrix.environment_file }}
      verify_restore: true
      require_populated_data: true
    secrets:
      AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN }}
      AZURE_ARTIFACTS_USER_NAME: ${{ secrets.AZURE_ARTIFACTS_USER_NAME }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  build-ci-docker-images:
    name: Build CI Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      use_prebuilt_images: ${{ steps.prepare-images.outputs.use_prebuilt_images }}
      dms_image: ${{ steps.prepare-images.outputs.dms_image }}
      config_image: ${{ steps.prepare-images.outputs.config_image }}
      dms_compose_image: ${{ steps.prepare-images.outputs.dms_compose_image }}
      config_compose_image: ${{ steps.prepare-images.outputs.config_compose_image }}
    env:
      # Set repository variable REBUILD_DOWNSTREAM_IMAGES=true to keep downstream
      # smoke jobs rebuilding local images while rolling this change back or forward.
      REBUILD_DOWNSTREAM_IMAGES: ${{ vars.REBUILD_DOWNSTREAM_IMAGES }}
      IS_FORK_PULL_REQUEST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Prepare CI image tags
        id: prepare-images
        shell: bash
        run: |
          rebuild_downstream_images="${REBUILD_DOWNSTREAM_IMAGES:-false}"
          rebuild_downstream_images="${rebuild_downstream_images,,}"
          use_prebuilt_images="true"

          case "$rebuild_downstream_images" in
            1|true|yes|y|on)
              use_prebuilt_images="false"
              ;;
          esac

          if [[ "$IS_FORK_PULL_REQUEST" == "true" ]]; then
            use_prebuilt_images="false"
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image_sha="${PULL_REQUEST_HEAD_SHA:-$GITHUB_SHA}"
          dms_image="ghcr.io/${owner}/data-management-service-smoke-ed-fi-api-ci:${image_sha}"
          config_image="ghcr.io/${owner}/data-management-service-smoke-ed-fi-api-config-ci:${image_sha}"

          dms_compose_image=""
          config_compose_image=""
          if [[ "$use_prebuilt_images" == "true" ]]; then
            dms_compose_image="$dms_image"
            config_compose_image="$config_image"
          fi

          {
            echo "use_prebuilt_images=$use_prebuilt_images"
            echo "dms_image=$dms_image"
            echo "config_image=$config_image"
            echo "dms_compose_image=$dms_compose_image"
            echo "config_compose_image=$config_compose_image"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Login to GitHub Container Registry
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push DMS smoke CI Docker image
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: true
          tags: ${{ steps.prepare-images.outputs.dms_image }}
          cache-from: type=gha,scope=smoke-dms-image
          cache-to: type=gha,mode=max,scope=smoke-dms-image

      - name: Build and push Config smoke CI Docker image
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: true
          tags: ${{ steps.prepare-images.outputs.config_image }}
          cache-from: type=gha,scope=smoke-config-image
          cache-to: type=gha,mode=max,scope=smoke-config-image

  smoke-test:
    name: Smoke Tests ${{ matrix.standard_version }}
    needs: [build-populated-template, build-ci-docker-images]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
    # Each leg smoke-tests the template built for the same version. Keep this matrix in sync
    # with the build-populated-template matrix above.
    strategy:
      fail-fast: false
      matrix:
        include:
          - standard_version: "5.2.0"
            package_name: "EdFi.Api.Smoke.Template.PostgreSql.5.2.0"
            environment_file: "./.env.smoke"
            # The published ODS SDK sweep uses EdFi.Suite3.OdsApi.TestSdk.Standard.5.2.0,
            # which is DS 5.2-specific, so it only runs on the 5.2 leg.
            run_ods_sdk_tests: true
          - standard_version: "6.1.0"
            package_name: "EdFi.Api.Smoke.Template.PostgreSql.6.1.0"
            environment_file: "./.env.smoke.ds61"
            run_ods_sdk_tests: false

    env:
      DMS_DOCKER_IMAGE: ${{ needs.build-ci-docker-images.outputs.dms_compose_image }}
      DMS_CONFIG_DOCKER_IMAGE: ${{ needs.build-ci-docker-images.outputs.config_compose_image }}
      SMOKE_DATABASE_NAME: edfi_datamanagementservice_smoke

    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull CI Docker images
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images == 'true'
        run: |
          docker pull "${{ needs.build-ci-docker-images.outputs.dms_image }}"
          docker pull "${{ needs.build-ci-docker-images.outputs.config_image }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up Docker Buildx
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/nuget.config', 'src/dms/Dockerfile', 'src/dms/**', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS
        run: ./build-dms.ps1 Build -Configuration Release

      - name: Build DMS Docker image
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Build Config Docker image
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-config-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Download Populated Template Package artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: "${{ matrix.package_name }}-NuGet"
          path: ${{ github.workspace }}/template-package

      # The smoke environment serves the four-package DS52 + TPDM + Sample + Homograph
      # surface the published ODS SDK sweep expects. The dms.EffectiveSchema fingerprint
      # requires the running schema packages and the restored database to match exactly,
      # so the smoke test reuses the same .env.smoke the in-run template was
      # built from. This is smoke coverage only; the product template stays Core+TPDM.
      - name: Start DMS with Core, TPDM, Sample, and Homograph (SmokeTest)
        run: |
          $env:LOG_LEVEL="Warning"
          ./start-local-dms.ps1 -EnvironmentFile "${{ matrix.environment_file }}" -EnableConfig
        working-directory: eng/docker-compose/

      - name: Wait for the Configuration Service to be ready
        run: |
          $deadline = [datetime]::UtcNow.AddSeconds(300)
          while ($true) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8081/health" -Method Get -TimeoutSec 5 -ErrorAction Stop
              if ($response.StatusCode -eq 200) { break }
            }
            catch {
              $null = $_
            }

            if ([datetime]::UtcNow -ge $deadline) {
              throw "Configuration Service did not become healthy within 300 seconds."
            }

            Start-Sleep -Seconds 5
          }

      - name: Restore the Populated Template artifact into the smoke database
        run: |
          Import-Module ./Template-Management.psm1 -Force
          Restore-TemplatePackage -PackageDirectory "${{ github.workspace }}/template-package" -DatabaseName $env:SMOKE_DATABASE_NAME
        working-directory: eng/DatabaseTemplates/

      # DMS fails fatally at startup when the Configuration Service has no data stores.
      # No data store is created by default; register the restored smoke database as the
      # single data store and hand its id forward; the Configuration Service protects data
      # store connection strings in API responses, so the id from registration is the only
      # reliable way to select this data store later.
      - name: Register the smoke test data store
        run: |
          Import-Module ../Dms-Management.psm1 -Force
          Import-Module ./env-utility.psm1 -Force
          $envValues = ReadValuesFromEnvFile "${{ matrix.environment_file }}"
          Add-CmsClient -CmsUrl "http://localhost:8081" -ClientId "data-store-admin" -ClientSecret "ValidClientSecret1234567890!Abcd" -DisplayName "Data Store Setup Administrator"
          $configToken = Get-CmsToken -CmsUrl "http://localhost:8081" -ClientId "data-store-admin" -ClientSecret "ValidClientSecret1234567890!Abcd"
          $dataStoreId = Add-DataStore -CmsUrl "http://localhost:8081" -AccessToken $configToken -PostgresPassword $envValues.POSTGRES_PASSWORD -PostgresDbName $env:SMOKE_DATABASE_NAME -Name "Smoke Test Data Store" -DataStoreType "SmokeTest"
          if (-not $dataStoreId) {
            throw "Failed to register the smoke test data store."
          }
          "SMOKE_DATA_STORE_ID=$dataStoreId" | Out-File -FilePath $env:GITHUB_ENV -Append
        working-directory: eng/docker-compose/

      - name: Restart DMS to load the smoke data store
        run: |
          docker restart ed-fi-api

      - name: Wait for services to be ready
        run: |
          Write-Host "Waiting for DMS to be ready..."
          $maxAttempts = 30
          $attempt = 0
          do {
              Start-Sleep -Seconds 10
              try {
                  $response = Invoke-RestMethod -Uri "http://localhost:8080/health" -Method Get -TimeoutSec 5
                  if ($response) {
                      Write-Host "DMS is ready!"
                      break
                  }
              }
              catch {
                  Write-Host "Attempt $($attempt + 1): DMS not ready yet..."
              }
              $attempt++
          } while ($attempt -lt $maxAttempts)

          if ($attempt -eq $maxAttempts) {
              Write-Error "DMS failed to start within expected time"
              exit 1
          }

      - name: Create Smoke Test Credentials
        run: |
          Import-Module ./modules/SmokeTest.psm1 -Force
          $credentials = Get-SmokeTestCredentials -ConfigServiceUrl "http://localhost:8081" -DataStoreIds @([long]$env:SMOKE_DATA_STORE_ID)
          # Store credentials in environment variables for subsequent steps
          "SMOKE_TEST_KEY=$($credentials.Key)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SMOKE_TEST_SECRET=$($credentials.Secret)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Smoke test credentials created successfully"
        working-directory: eng/smoke_test/

      - name: Generate SDK for Smoke Tests
        run: |
          ./build-sdk.ps1 BuildAndGenerateSdk -DmsUrl "http://localhost:8080" -PackageName "EdFi.Api.TestSdk"

      - name: Verify SDK Generation
        run: |
          Write-Host "Checking SDK generation results..."
          $sdkPath = "${{ github.workspace }}/eng/sdkGen/csharp/src/EdFi.Api.TestSdk/bin/Release/net10.0/EdFi.Api.TestSdk.dll"
          Write-Host "Expected SDK path: $sdkPath"

          if (Test-Path $sdkPath) {
              Write-Host "✅ SDK DLL found at expected location"
              $fileInfo = Get-Item $sdkPath
              Write-Host "File size: $($fileInfo.Length) bytes"
              Write-Host "Last modified: $($fileInfo.LastWriteTime)"
          } else {
              Write-Host "❌ SDK DLL not found at expected location"
              Write-Host "Listing contents of SDK generation directory:"
              if (Test-Path "${{ github.workspace }}/eng/sdkGen") {
                  Get-ChildItem -Path "${{ github.workspace }}/eng/sdkGen" -Recurse | Where-Object { $_.Name -like "*.dll" } | ForEach-Object {
                      Write-Host "Found DLL: $($_.FullName)"
                  }
              } else {
                  Write-Host "sdkGen directory not found"
              }
              exit 1
          }

      # The smoke test console must fetch tokens through the host-reachable DMS token
      # proxy: the stack's advertised OAuth endpoint is Docker-internal (the DMS
      # container forwards /oauth/token to it), so the discovery document cannot be
      # used from the runner host. This is the same token route BulkLoadClient uses
      # during the template build.
      - name: Run NonDestructive API Tests
        run: |
          ./Invoke-NonDestructiveApiTests.ps1 -BaseUrl "http://localhost:8080" -Key "$env:SMOKE_TEST_KEY" -Secret "$env:SMOKE_TEST_SECRET" -OAuthUrl "http://localhost:8080/oauth/token"
        working-directory: eng/smoke_test/

      - name: Run NonDestructive DMS SDK Tests
        run: |
          ./Invoke-NonDestructiveSdkTests.ps1 -BaseUrl "http://localhost:8080" -Key "$env:SMOKE_TEST_KEY" -Secret "$env:SMOKE_TEST_SECRET" -SdkPath "${{ github.workspace }}/eng/sdkGen/csharp/src/EdFi.Api.TestSdk/bin/Release/net10.0/EdFi.Api.TestSdk.dll" -OAuthUrl "http://localhost:8080/oauth/token"
        working-directory: eng/smoke_test/

      - name: Run Destructive DMS SDK Tests
        run: |
          ./Invoke-DestructiveSdkTests.ps1 -BaseUrl "http://localhost:8080" -Key "$env:SMOKE_TEST_KEY" -Secret "$env:SMOKE_TEST_SECRET" -SdkPath "${{ github.workspace }}/eng/sdkGen/csharp/src/EdFi.Api.TestSdk/bin/Release/net10.0/EdFi.Api.TestSdk.dll" -OAuthUrl "http://localhost:8080/oauth/token"
        working-directory: eng/smoke_test/

      # The ODS SDK sweep uses the published EdFi.Suite3.OdsApi.TestSdk.Standard.5.2.0 (DS 5.2),
      # so it only runs on the DS 5.2 leg. DS 6.1 is still covered by the API + DMS SDK tests above.
      - name: Run NonDestructive ODS SDK Tests
        if: ${{ matrix.run_ods_sdk_tests }}
        run: |
          ./Invoke-NonDestructiveSdkTests.ps1 -BaseUrl "http://localhost:8080" -Key "$env:SMOKE_TEST_KEY" -Secret "$env:SMOKE_TEST_SECRET" -SdkNamespace "EdFi.OdsApi.Sdk" -OAuthUrl "http://localhost:8080/oauth/token"
        working-directory: eng/smoke_test/

      - name: Run Destructive ODS SDK Tests
        if: ${{ matrix.run_ods_sdk_tests }}
        run: |
          ./Invoke-DestructiveSdkTests.ps1 -BaseUrl "http://localhost:8080" -Key "$env:SMOKE_TEST_KEY" -Secret "$env:SMOKE_TEST_SECRET" -SdkNamespace "EdFi.OdsApi.Sdk" -OAuthUrl "http://localhost:8080/oauth/token"
        working-directory: eng/smoke_test/

      - name: Export Docker Logs on Failure
        if: failure()
        run: |
          $logDir = "${{ github.workspace }}/logs"
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          docker ps --format "{{.Names}}" | ForEach-Object {
              $container = $_
              $logPath = Join-Path $logDir "$container.log"
              Write-Host "Exporting logs for container: $container"
              docker logs $container > $logPath 2>&1
          }

      - name: Upload Docker Logs
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Smoke-Tests-Docker-Logs
          path: ${{ github.workspace }}/logs
          retention-days: 10

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: always() && github.event_name != 'workflow_dispatch' && github.event_name != 'pull_request'
    steps:
      - name: Notify Slack on success
        if: ${{ needs.smoke-test.result == 'success' }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          payload: |
            {
              "text": "✅ Scheduled smoke tests passed successfully!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Scheduled Smoke Tests - SUCCESS*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*DMS Backend:* Single backend path\n*DS 5.2:* Core + TPDM + Sample + Homograph; DMS NonDestructive API/SDK, DMS Destructive SDK, ODS NonDestructive/Destructive SDK\n*DS 6.1:* Core (TPDM in-core) + Sample + Homograph; DMS NonDestructive API/SDK, DMS Destructive SDK (ODS SDK skipped, DS-5.2-specific)\n*Log URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Notify Slack on failure
        if: ${{ needs.smoke-test.result == 'failure' }}
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          payload: |
            {
              "text": "❌ Scheduled smoke tests failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Scheduled Smoke Tests - FAILURE*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*DMS Backend:* Single backend path\n*DS 5.2:* Core + TPDM + Sample + Homograph; DMS NonDestructive API/SDK, DMS Destructive SDK, ODS NonDestructive/Destructive SDK\n*DS 6.1:* Core (TPDM in-core) + Sample + Homograph; DMS NonDestructive API/SDK, DMS Destructive SDK (ODS SDK skipped, DS-5.2-specific)\n*Log URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
