name: Pkg EdFi.Api.Sdk
on:
  release:
    types:
      - released
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_package:
        description: "Publish the built SDK package to the Azure Artifacts feed"
        type: boolean
        default: false

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build-core-sdk:
    name: Build Core SDK ${{ matrix.standard_version }}
    # One leg per supported Ed-Fi Data Standard version. Each leg invokes the whole reusable
    # build/SBOM/provenance pipeline, so per-version outputs stay correlated. To add or drop a
    # version, add or remove an `include` entry below (and its matching schema artifacts); see
    # docs/DATA-STANDARD-VERSIONS.md. DS 5.2 is the default. provenance_file must stay unique per
    # leg so the SLSA provenance artifacts do not collide.
    strategy:
      fail-fast: false
      matrix:
        include:
          - standard_version: "5.2.0"
            data_standard_version: ""
            sdk_package_name: "EdFi.Api.Sdk.Standard.5.2.0"
            provenance_file: "core.sdk.intoto.jsonl"
          - standard_version: "6.1.0"
            data_standard_version: "6.1"
            sdk_package_name: "EdFi.Api.Sdk.Standard.6.1.0"
            provenance_file: "core.sdk.6.1.0.intoto.jsonl"
    uses: ./.github/workflows/build-sdk-package.yml
    with:
      sdk_package_base: "EdFi.Api.Sdk"
      sdk_display_name: "Core SDK"
      standard_version: ${{ matrix.standard_version }}
      data_standard_version: ${{ matrix.data_standard_version }}
      sdk_package_name: ${{ matrix.sdk_package_name }}
      manifest_file: "_manifest/spdx_2.2/manifest.spdx.json"
      provenance_file: ${{ matrix.provenance_file }}
      publish_package: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_package == true }}
    secrets:
      AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_PERSONAL_ACCESS_TOKEN }}
      AZURE_ARTIFACTS_USER_NAME: ${{ secrets.AZURE_ARTIFACTS_USER_NAME }}
