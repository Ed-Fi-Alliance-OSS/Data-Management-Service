name: Nightly Keycloak DMS E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 0-5" # Sunday-Friday at 8 AM UTC; Saturday is covered by Scheduled Build

permissions: read-all

env:
  CONFIGURATION: "Release"

jobs:
  keycloak-e2e:
    name: Run PostgreSQL DMS E2E (keycloak, Shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/dms/Dockerfile', 'src/dms/**', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Build Config Docker image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-config-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: ./build-dms.ps1 Build -Configuration ${{ env.CONFIGURATION }} -IdentityProvider keycloak

      - name: Run DMS E2E (IdentityProvider keycloak, Shard ${{ matrix.shard }})
        id: e2e
        if: success()
        run: |
          ./build-dms.ps1 E2ETest `
            -Configuration ${{ env.CONFIGURATION }} `
            -SkipDockerBuild `
            -IdentityProvider keycloak `
            -EnvironmentFile './.env.e2e' `
            -TestFilter 'Category=@e2e-ci-shard-${{ matrix.shard }}'

      - name: Export DMS E2E Docker Logs
        if: always() && steps.e2e.outcome == 'failure'
        run: |
          $logDir = "${{ github.workspace }}/logs/nightly-keycloak-e2e-shard-${{ matrix.shard }}"
          Remove-Item -Path $logDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          $containers = @(docker ps -a --format "{{.Names}}" | Sort-Object)

          if ($containers.Count -eq 0) {
              Write-Host "No Docker containers found for log export."
              exit 0
          }

          foreach ($container in $containers) {
              $logPath = Join-Path $logDir "$container.log"
              docker logs $container > $logPath 2>&1

              if ($container -eq "dms-postgresql") {
                  $postgresDiagnosticsPath = Join-Path $logDir "$container.storage.txt"
                  docker stats $container --no-stream > $postgresDiagnosticsPath 2>&1
                  docker exec $container df -h /var/lib/postgresql/data >> $postgresDiagnosticsPath 2>&1
                  docker exec $container du -sh /var/lib/postgresql/data >> $postgresDiagnosticsPath 2>&1
              }
          }

      - name: Upload DMS E2E Logs
        if: always() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: nightly-keycloak-e2e-shard-${{ matrix.shard }}-test-logs
          path: |
            ${{ github.workspace }}/logs/nightly-keycloak-e2e-shard-${{ matrix.shard }}
          retention-days: 10

      - name: Report DMS E2E Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && hashFiles(format('TestResults/EdFi.DataManagementService.Tests.E2E.e2e-shard-{0}.trx', matrix.shard)) != ''
        with:
          name: DMS E2E Test Results (keycloak, shard ${{ matrix.shard }})
          path: TestResults/EdFi.DataManagementService.Tests.E2E.e2e-shard-${{ matrix.shard }}.trx
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Upload DMS E2E Test Results
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        if: always()
        with:
          name: nightly-keycloak-e2e-shard-${{ matrix.shard }}-test-results
          path: TestResults/EdFi.DataManagementService.Tests.E2E.e2e-shard-${{ matrix.shard }}.trx
          if-no-files-found: ignore
          retention-days: 30

      - name: Summarize DMS E2E Test Timings
        if: always()
        run: |
          ./eng/ci/summarize-test-timings.ps1 `
            -Path "./TestResults/EdFi.DataManagementService.Tests.E2E.e2e-shard-${{ matrix.shard }}.trx" `
            -OutputDirectory "./TestResults/test-timings/nightly-keycloak-e2e-shard-${{ matrix.shard }}" `
            -SuiteName "Nightly Keycloak DMS E2E (Shard ${{ matrix.shard }})" `
            -AppendToGitHubStepSummary

      - name: Upload DMS E2E Timing Artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        if: always()
        with:
          name: test-timings-nightly-keycloak-e2e-shard-${{ matrix.shard }}
          path: |
            TestResults/EdFi.DataManagementService.Tests.E2E.e2e-shard-${{ matrix.shard }}.trx
            TestResults/test-timings/nightly-keycloak-e2e-shard-${{ matrix.shard }}/**
          if-no-files-found: ignore
          retention-days: 30

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: keycloak-e2e
    if: always()
    steps:
      - name: Notify Slack on success
        if: github.event_name != 'workflow_dispatch' && needs.keycloak-e2e.result == 'success'
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d #v2.0.0
        with:
          payload: |
            {
              "text": "Nightly Keycloak DMS E2E passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Workflow:* ${{ github.workflow }}\n*Branch/Ref:* ${{ github.ref }}\n*Commit SHA:* ${{ github.sha }}\n*Log URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Notify Slack on failure
        if: github.event_name != 'workflow_dispatch' && needs.keycloak-e2e.result != 'success'
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d #v2.0.0
        with:
          payload: |
            {
              "text": "Nightly Keycloak DMS E2E failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Workflow:* ${{ github.workflow }}\n*Branch/Ref:* ${{ github.ref }}\n*Commit SHA:* ${{ github.sha }}\n*Result:* ${{ needs.keycloak-e2e.result }}\n*Log URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
