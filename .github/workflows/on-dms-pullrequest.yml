          docker pull "${{ needs.build-ci-docker-images.outputs.config_image }}"

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up Docker Buildx
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Cache Docker layers
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('src/Directory.Packages.props', 'src/nuget.config', 'src/dms/Dockerfile', 'src/dms/**', 'src/config/Dockerfile', 'src/config/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build DMS Docker image
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Build Config Docker image
        if: needs.build-ci-docker-images.outputs.use_prebuilt_images != 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          load: true
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: false
          tags: ed-fi-api-config-local:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: ./build-dms.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Preflight DMS Schema Compile
        run: |
          ./eng/preflight-dms-schema-compile.ps1 `
            -EnvironmentFile "./eng/docker-compose/.env.e2e" `
            -Configuration "${{ env.CONFIGURATION }}" `
            -Dialect "pgsql" `
            -OutputDirectory "${{ runner.temp }}/api-schema-preflight"

      - name: Start DMS Docker
        run: |
          ./start-local-dms.ps1 -EnvironmentFile "./.env.e2e" -EnableConfig
        working-directory: eng/docker-compose/

      # Legacy DLL-backed flow (no bootstrap manifest, non-bootstrap compatibility): the claims-ready
      # gate does not apply, and the DMS container restarts until this data store exists
      # (restart: unless-stopped).
      - name: Configure DMS Data Store
        run: |
          ./configure-local-data-store.ps1 -EnvironmentFile "./.env.e2e"
        working-directory: eng/docker-compose/

      - name: Wait for DMS to be ready
        run: |
          $maxAttempts = 10
          $attempt = 0
          $ready = $false

          while (-not $ready -and $attempt -lt $maxAttempts) {
            $attempt++
            Write-Host "Waiting for DMS to be ready (attempt $attempt/$maxAttempts)..."

            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/resources-spec.json" -Method Get -TimeoutSec 5 -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                $ready = $true
                Write-Host "DMS is ready!"
              }
            }
            catch {
              Write-Host "DMS not ready yet: $_"
              Start-Sleep -Seconds 10
            }
          }

          if (-not $ready) {
            throw "DMS did not become ready within the timeout period"
          }

      - name: Download OpenAPI specs
        run: |
          mkdir specs
          Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/resources-spec.json" -OutFile "specs/resources-spec.json"
          Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/descriptors-spec.json" -OutFile "specs/descriptors-spec.json"
          Invoke-WebRequest -Uri "http://localhost:8080/metadata/specifications/discovery-spec.json" -OutFile "specs/discovery-spec.json"

      - name: Upload Resources Spec
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: resources-spec
          path: specs/resources-spec.json

      - name: Upload Descriptors Spec
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: descriptors-spec
          path: specs/descriptors-spec.json

      - name: Upload Discovery Spec
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: discovery-spec
          path: specs/discovery-spec.json

      - name: Export DMS Startup Diagnostics
        if: failure()
        run: |
          $diagnosticsDir = "${{ github.workspace }}/logs"
          New-Item -ItemType Directory -Path $diagnosticsDir -Force | Out-Null

          $containers = docker ps -a --format "{{.Names}}" | Where-Object {
            $_ -eq "ed-fi-api" -or $_ -eq "dms-postgresql"
          } | Sort-Object

          if (@($containers).Count -eq 0) {
            Write-Host "No dms-local containers were found for startup diagnostics."
            exit 0
          }

          $dmsContainer = @($containers) | Where-Object {
            $_ -eq "ed-fi-api"
          } | Select-Object -First 1

          if ($null -ne $dmsContainer) {
            $statusArtifactPath = Join-Path $diagnosticsDir "dms-startup-status.json"
            docker cp "${dmsContainer}:/tmp/dms-startup-status.json" $statusArtifactPath 2>$null

            if (Test-Path $statusArtifactPath) {
              Write-Host "`n========== DMS Startup Status =========="
              Get-Content $statusArtifactPath
              Write-Host "=======================================`n"
            }
            else {
              Write-Host "DMS startup status file was not present in container $dmsContainer."
            }
          }

          foreach ($container in $containers) {
            $logPath = Join-Path $diagnosticsDir "$container.log"
            docker logs $container > $logPath 2>&1

            if ($container -eq "dms-postgresql") {
              $postgresDiagnosticsPath = Join-Path $diagnosticsDir "$container.storage.txt"
              docker stats $container --no-stream > $postgresDiagnosticsPath 2>&1
              docker exec $container df -h /var/lib/postgresql/data >> $postgresDiagnosticsPath 2>&1
              docker exec $container du -sh /var/lib/postgresql/data >> $postgresDiagnosticsPath 2>&1
            }

            if ($container -eq $dmsContainer) {
              Write-Host "`n========== ${container} logs =========="
              Get-Content $logPath
              Write-Host "======================================`n"
            }
          }

      - name: Upload DMS Startup Diagnostics
        if: failure()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: build-and-start-dms-diagnostics
          path: |
            ${{ github.workspace }}/logs
          retention-days: 10

  validate-resources-spec:
    name: Validate Resources Spec
    runs-on: ubuntu-latest
    needs: build-and-start-dms
    services:
      swagger-editor:
        image: swaggerapi/swagger-editor:v4.14.8
        ports:
          - 80:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
    steps:
      - name: Download Resources Spec
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: resources-spec
          path: specs

      - name: Validate Resources Spec
        uses: swaggerexpert/swagger-editor-validate@54b85e2f5c1fcdee85308dd57cad8c8ec19d3970
        with:
          swagger-editor-url: http://localhost/
          definition-file: specs/resources-spec.json
          default-timeout: 45000

  validate-descriptors-spec:
    name: Validate Descriptors Spec
    runs-on: ubuntu-latest
    needs: build-and-start-dms
    services:
      swagger-editor:
        image: swaggerapi/swagger-editor:v4.14.8
        ports:
          - 80:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
    steps:
      - name: Download Descriptors Spec
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: descriptors-spec
          path: specs

      - name: Validate Descriptors Spec
        uses: swaggerexpert/swagger-editor-validate@54b85e2f5c1fcdee85308dd57cad8c8ec19d3970
        with:
          swagger-editor-url: http://localhost/
          definition-file: specs/descriptors-spec.json
          default-timeout: 45000

  validate-discovery-spec:
