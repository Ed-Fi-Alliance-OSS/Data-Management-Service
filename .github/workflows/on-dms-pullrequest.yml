        image: swaggerapi/swagger-editor:v4.14.8
        ports:
          - 80:8080
        options: >-
          --health-cmd="curl -f http://localhost:8080 || exit 1"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=20
    steps:
      - name: Download Discovery Spec
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        with:
          name: discovery-spec
          path: specs

      - name: Validate Discovery Spec
        uses: swaggerexpert/swagger-editor-validate@54b85e2f5c1fcdee85308dd57cad8c8ec19d3970
        with:
          swagger-editor-url: http://localhost/
          definition-file: specs/discovery-spec.json
          default-timeout: 45000

  fresh-rebuild-docker-images:
    name: Fresh Rebuild DMS and Config Docker Images
    needs: [detect-fresh-build-changes, build-and-start-dms]
    if: always() && needs.detect-fresh-build-changes.outputs.fresh_build_required == 'true' && needs.build-and-start-dms.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Fresh rebuild DMS and Config Docker images
        working-directory: eng/docker-compose
        run: |
          docker compose -f postgresql.yml -f local-dms.yml -f kafka.yml -f local-config.yml --env-file "./.env.e2e" -p dms-local build --no-cache

  test-timing-summary:
    name: Test Timing Summary
    runs-on: ubuntu-latest
    needs:
      [
        run-e2e-tests,
        run-e2e-tests-ds61,
        run-instance-management-e2e-tests,
        run-backend-mssql-integration-tests,
        run-dms-api-mssql-integration-tests,
      ]
    if: always()
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Test Timing Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 #v4.1.8
        continue-on-error: true
        with:
          pattern: test-timings-*
          path: test-timing-artifacts
          merge-multiple: false

      - name: Summarize Aggregate Test Timings
        run: |
          ./eng/ci/summarize-test-timings.ps1 `
            -Path "./test-timing-artifacts" `
            -OutputDirectory "./TestResults/test-timings/aggregate" `
            -SuiteName "Aggregate CI Test Timings" `
            -SlowTestCount 40 `
            -SlowFixtureCount 20 `
            -AppendToGitHubStepSummary

      - name: Upload Aggregate Timing Artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        if: always()
        with:
          name: test-timings-aggregate
          path: TestResults/test-timings/aggregate/**
          if-no-files-found: ignore
          retention-days: 30

  event_file:
    name: Upload Event File
    runs-on: ubuntu-latest
    needs:
      [
        verify-lock-files,
        verify-schematools-package,
        run-unit-tests,
        run-e2e-tests,
        e2e-summary,
        run-instance-management-e2e-tests,
        run-backend-mssql-integration-tests,
        test-timing-summary,
        run-backend-postgresql-integration-tests,
        run-dms-api-postgresql-integration-tests,
        run-dms-api-mssql-integration-tests,
        run-cli-integration-tests,
        run-schematools-cli-integration-tests,
        run-schematools-postgresql-integration-tests,
        run-schematools-mssql-integration-tests,
        validate-resources-spec,
        validate-descriptors-spec,
        validate-discovery-spec,
        fresh-rebuild-docker-images,
      ]
    if: always()
    steps:
      - name: Upload
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Event File
          path: ${{ github.event_path }}
