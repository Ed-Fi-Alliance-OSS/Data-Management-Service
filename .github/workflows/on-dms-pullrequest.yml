        if: (success() || failure())
        with:
          name: Instance Management E2E Test Results (Shard ${{ matrix.shard }})
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Summarize Instance Management Test Timings
        if: always()
        run: |
          ./eng/ci/summarize-test-timings.ps1 `
            -Path "./TestResults/EdFi.InstanceManagement.Tests.E2E.instance-shard-${{ matrix.shard }}.trx" `
