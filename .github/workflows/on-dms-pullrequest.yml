name: On DMS Pull Request

on:
  push:
    # Running on push to main to support CodeQL on C#
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-dms.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/dms/**"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-dms.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/dms/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: "Release"
  MSSQL_IMAGE: "mcr.microsoft.com/mssql/server:2022-latest"
  MSSQL_CONTAINER_MEMORY: "10g"
  MSSQL_MEMORY_LIMIT_MB: "4096"
  MSSQL_TMPFS_SIZE: "4g"
  POSTGRES_INTEGRATION_IMAGE: "postgres:16.3-alpine"
  POSTGRES_CONTAINER_MEMORY: "10g"
  POSTGRES_TMPFS_SIZE: "4g"
  POSTGRES_USE_TMPFS: "true"

permissions: read-all

jobs:
  detect-fresh-build-changes:
    name: Detect Fresh Build Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      fresh_build_required: ${{ steps.detect.outputs.fresh_build_required }}
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect files that require a fresh rebuild
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "fresh_build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            before="${{ github.event.before }}"

            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            else
              changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
            fi
          fi

          fresh_build_required=false

          while IFS= read -r file; do
            case "$file" in
              src/Directory.Packages.props|src/dms/Dockerfile|src/config/Dockerfile|eng/docker-compose/*)
                fresh_build_required=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "fresh_build_required=$fresh_build_required" >> "$GITHUB_OUTPUT"

  scan-actions-bidi:
    name: Scan Actions, scan all files for BIDI Trojan Attacks
    uses: Ed-Fi-Alliance-OSS/Ed-Fi-Actions/.github/workflows/repository-scanner.yml@main
    with:
      config-file-path: ./.github/workflows/bidi-config.json

  run-bootstrap-pester-tests:
    name: Run Bootstrap Pester Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        run: Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Run Bootstrap Pester Tests
        env:
          # Opts the BulkLoadClient real-package smoke test into the CI run so a regression in the
          # pinned package version (e.g. a build that breaks the XML-mode CLI surface) is caught
          # here in seconds instead of waiting for the E2E lane to fail. The setup-dotnet step
          # above provides the SDK the smoke test needs; without it the test would self-skip
          # silently.
          DMS_BOOTSTRAP_RUN_PACKAGE_TESTS: "true"
        run: |
          $paths = @(
            "eng/docker-compose/tests/BootstrapSchemaAndSecuritySelection.Tests.ps1",
            "eng/docker-compose/tests/BootstrapSeedDelivery.Tests.ps1"
          )
          $result = Invoke-Pester -Path $paths -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) bootstrap Pester test(s) failed."
          }

  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: ./build-dms.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Restore .NET tools
        if: success()
        run: dotnet tool restore

      - name: Run Unit Tests
        run: ./build-dms.ps1 UnitTest -Configuration ${{ env.CONFIGURATION }}

      - name: Generate Coverage Report
        if: ${{ hashFiles('coverage.cobertura.xml') != '' }}
        run: ./build-dms.ps1 Coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Coverage Report
          path: coveragereport

      - name: Upload Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: Unit Tests
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

  run-backend-mssql-integration-tests:
    name: Run Backend MSSQL Integration Tests (${{ matrix.shard-name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            shard-name: Authorization
            shard-category: MssqlCiShard1
          - shard: 2
            shard-name: Profile
            shard-category: MssqlCiShard2
          - shard: 3
            shard-name: Descriptor and Reference
            shard-category: MssqlCiShard3
          - shard: 4
            shard-name: DDL and Utility
            shard-category: MssqlCiShard4
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Start MSSQL Container
        uses: ./.github/actions/start-mssql-test-container
        with:
          container-name: dms-ci-mssql-${{ matrix.shard }}
          container-memory: ${{ env.MSSQL_CONTAINER_MEMORY }}
          sql-memory-limit-mb: ${{ env.MSSQL_MEMORY_LIMIT_MB }}
          tmpfs-size: ${{ env.MSSQL_TMPFS_SIZE }}
          image: ${{ env.MSSQL_IMAGE }}

      - name: Restore Backend MSSQL Integration Tests
        run: |
          dotnet restore ./src/dms/backend/EdFi.DataManagementService.Backend.Mssql.Tests.Integration/EdFi.DataManagementService.Backend.Mssql.Tests.Integration.csproj --verbosity:normal

      - name: Run Backend MSSQL Integration Tests
        if: success()
        run: |
          dotnet test ./src/dms/backend/EdFi.DataManagementService.Backend.Mssql.Tests.Integration/EdFi.DataManagementService.Backend.Mssql.Tests.Integration.csproj `
            -c ${{ env.CONFIGURATION }} `
            --no-restore `
            -v normal `
            --filter "Category=${{ matrix.shard-category }}" `
            --logger "trx;LogFileName=EdFi.DataManagementService.Backend.Mssql.Tests.Integration.Shard${{ matrix.shard }}.trx" `
            --logger "console" `
            --nologo

      - name: Upload Backend MSSQL Integration Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: Backend MSSQL Integration Tests (${{ matrix.shard-name }})
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Export MSSQL Logs
        if: failure()
        uses: ./.github/actions/export-database-container-diagnostics
        with:
          container-name: dms-ci-mssql-${{ matrix.shard }}
          data-path: /var/opt/mssql

      - name: Teardown MSSQL Container
        if: always()
        run: docker rm -f dms-ci-mssql-${{ matrix.shard }}

  run-dms-api-mssql-integration-tests:
    name: Run DMS API MSSQL Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Start MSSQL Container
        uses: ./.github/actions/start-mssql-test-container
        with:
          container-name: dms-ci-api-mssql
          container-memory: ${{ env.MSSQL_CONTAINER_MEMORY }}
          sql-memory-limit-mb: ${{ env.MSSQL_MEMORY_LIMIT_MB }}
          tmpfs-size: ${{ env.MSSQL_TMPFS_SIZE }}
          image: ${{ env.MSSQL_IMAGE }}

      - name: Restore DMS API MSSQL Integration Tests
        run: |
          dotnet restore ./src/dms/tests/EdFi.DataManagementService.Tests.Integration/EdFi.DataManagementService.Tests.Integration.csproj --verbosity:normal

      - name: Run DMS API MSSQL Integration Tests
        if: success()
        run: |
          dotnet test ./src/dms/tests/EdFi.DataManagementService.Tests.Integration/EdFi.DataManagementService.Tests.Integration.csproj `
            -c ${{ env.CONFIGURATION }} `
            --no-restore `
            -v normal `
            --filter "Category=ApiIntegration&Category=MssqlIntegration" `
            --logger "trx;LogFileName=EdFi.DataManagementService.Tests.Integration.Mssql.trx" `
            --logger "console" `
            --nologo

      - name: Upload DMS API MSSQL Integration Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: DMS API MSSQL Integration Tests
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Export MSSQL Logs
        if: failure()
        uses: ./.github/actions/export-database-container-diagnostics
        with:
          container-name: dms-ci-api-mssql
          data-path: /var/opt/mssql

      - name: Teardown MSSQL Container
        if: always()
        run: docker rm -f dms-ci-api-mssql

  run-backend-postgresql-integration-tests:
    name: Run Backend PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Start PostgreSQL Container
        uses: ./.github/actions/start-postgresql-test-container
        with:
          container-name: dms-ci-postgresql
          container-memory: ${{ env.POSTGRES_CONTAINER_MEMORY }}
          tmpfs-size: ${{ env.POSTGRES_TMPFS_SIZE }}
          image: ${{ env.POSTGRES_INTEGRATION_IMAGE }}

      - name: Restore Backend PostgreSQL Integration Tests
        run: |
          dotnet restore ./src/dms/backend/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration.csproj --verbosity:normal

      - name: Run Backend PostgreSQL Integration Tests
        if: success()
        run: |
          dotnet test ./src/dms/backend/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration.csproj `
            -c ${{ env.CONFIGURATION }} `
            --no-restore `
            -v normal `
            --logger "trx;LogFileName=EdFi.DataManagementService.Backend.Postgresql.Tests.Integration.trx" `
            --logger "console" `
            --nologo

      - name: Upload Backend PostgreSQL Integration Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: Backend PostgreSQL Integration Tests
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Export PostgreSQL Logs
        if: failure()
        uses: ./.github/actions/export-database-container-diagnostics
        with:
          container-name: dms-ci-postgresql
          data-path: /var/lib/postgresql/data

      - name: Teardown PostgreSQL Container
        if: always()
        run: docker rm -f dms-ci-postgresql

  run-dms-api-postgresql-integration-tests:
    name: Run DMS API PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    env:
      ConnectionStrings__DatabaseConnection: "Host=localhost;Port=5432;Username=postgres;Database=edfi_dms_backend_integration;Pooling=true;Minimum Pool Size=10;Maximum Pool Size=50;Application Name=EdFi.DataManagementService;NoResetOnClose=true;"
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Start PostgreSQL Container
        uses: ./.github/actions/start-postgresql-test-container
        with:
          container-name: dms-ci-postgresql
          container-memory: ${{ env.POSTGRES_CONTAINER_MEMORY }}
          tmpfs-size: ${{ env.POSTGRES_TMPFS_SIZE }}
          image: ${{ env.POSTGRES_INTEGRATION_IMAGE }}

      - name: Restore DMS API PostgreSQL Integration Tests
        run: |
          dotnet restore ./src/dms/tests/EdFi.DataManagementService.Tests.Integration/EdFi.DataManagementService.Tests.Integration.csproj --verbosity:normal

      - name: Run DMS API PostgreSQL Integration Tests
        if: success()
        run: |
          dotnet test ./src/dms/tests/EdFi.DataManagementService.Tests.Integration/EdFi.DataManagementService.Tests.Integration.csproj `
            -c ${{ env.CONFIGURATION }} `
            --no-restore `
            -v normal `
            --filter "Category=ApiIntegration&Category=PostgresqlIntegration" `
            --logger "trx;LogFileName=EdFi.DataManagementService.Tests.Integration.Postgresql.trx" `
            --logger "console" `
            --nologo

      - name: Upload DMS API PostgreSQL Integration Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: DMS API PostgreSQL Integration Tests
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Export PostgreSQL Logs
        if: failure()
        uses: ./.github/actions/export-database-container-diagnostics
        with:
          container-name: dms-ci-postgresql
          data-path: /var/lib/postgresql/data

      - name: Teardown PostgreSQL Container
        if: always()
        run: docker rm -f dms-ci-postgresql

  run-old-postgresql-integration-tests:
    name: Run Old PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Start PostgreSQL Container
        uses: ./.github/actions/start-postgresql-test-container
        with:
          container-name: dms-ci-postgresql
          container-memory: ${{ env.POSTGRES_CONTAINER_MEMORY }}
          tmpfs-size: ${{ env.POSTGRES_TMPFS_SIZE }}
          image: ${{ env.POSTGRES_INTEGRATION_IMAGE }}

      - name: Restore Old PostgreSQL Integration Tests
        run: |
          dotnet restore ./src/dms/backend/EdFi.DataManagementService.Old.Postgresql.Tests.Integration/EdFi.DataManagementService.Old.Postgresql.Tests.Integration.csproj --verbosity:normal

      - name: Run Old PostgreSQL Integration Tests
        if: success()
        run: |
          dotnet test ./src/dms/backend/EdFi.DataManagementService.Old.Postgresql.Tests.Integration/EdFi.DataManagementService.Old.Postgresql.Tests.Integration.csproj `
            -c ${{ env.CONFIGURATION }} `
            --no-restore `
            -v normal `
            --logger "trx;LogFileName=EdFi.DataManagementService.Old.Postgresql.Tests.Integration.trx" `
            --logger "console" `
            --nologo

      - name: Upload Old PostgreSQL Integration Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: Old PostgreSQL Integration Tests
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

      - name: Export PostgreSQL Logs
        if: failure()
        uses: ./.github/actions/export-database-container-diagnostics
        with:
          container-name: dms-ci-postgresql
          data-path: /var/lib/postgresql/data

      - name: Teardown PostgreSQL Container
        if: always()
        run: docker rm -f dms-ci-postgresql

  run-cli-integration-tests:
    name: Run CLI Integration Tests (${{ matrix.cli }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - cli: ApiSchemaDownloader
            project: ./src/dms/clis/EdFi.DataManagementService.ApiSchemaDownloader.Tests.Integration/EdFi.DataManagementService.ApiSchemaDownloader.Tests.Integration.csproj
            trx: EdFi.DataManagementService.ApiSchemaDownloader.Tests.Integration.trx
            test-filter: ""
          - cli: OpenApiGenerator
            project: ./src/dms/clis/EdFi.DataManagementService.OpenApiGenerator.Tests.Integration/EdFi.DataManagementService.OpenApiGenerator.Tests.Integration.csproj
            trx: EdFi.DataManagementService.OpenApiGenerator.Tests.Integration.trx
            test-filter: ""
          - cli: SchemaTools
            project: ./src/dms/clis/EdFi.DataManagementService.SchemaTools.Tests.Integration/EdFi.DataManagementService.SchemaTools.Tests.Integration.csproj
            trx: EdFi.DataManagementService.SchemaTools.Tests.Integration.NoDatabase.trx
            test-filter: "Category!=DatabaseIntegration"
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Restore CLI Integration Tests
        run: |
          dotnet restore ${{ matrix.project }} --verbosity:normal

      - name: Build CLI Integration Test Project
        run: |
          dotnet build ${{ matrix.project }} `
            -c ${{ env.CONFIGURATION }} `
            --no-restore `
            -v normal `
            --nologo

      - name: Run CLI Integration Tests
        if: success() && matrix.test-filter == ''
        run: |
          dotnet test ${{ matrix.project }} `
            -c ${{ env.CONFIGURATION }} `
            --no-build `
            --no-restore `
            -v normal `
            --logger "trx;LogFileName=${{ matrix.trx }}" `
            --logger "console" `
            --nologo

      - name: Run CLI Integration Tests
        if: success() && matrix.test-filter != ''
        run: |
          dotnet test ${{ matrix.project }} `
            -c ${{ env.CONFIGURATION }} `
            --no-build `
            --no-restore `
            -v normal `
            --filter "${{ matrix.test-filter }}" `
            --logger "trx;LogFileName=${{ matrix.trx }}" `
            --logger "console" `
            --nologo

      - name: Upload CLI Integration Test Results
