name: On DMS Pull Request

on:
  push:
    # Running on push to main to support CodeQL on C#
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-dms.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/nuget.config"
      - "src/dms/**"
      # The DMS E2E lanes (incl. the DS 6.1 version-coupled lane) bring up the Config Service built from
      # src/config, so config-only changes (e.g. ds61 Claims.json, ClaimsProvider, ResourceClaim seeding)
      # must still trigger this workflow's DMS + DS 6.1 validation.
      - "src/config/**"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build-dms.ps1"
      - "eng/**"
      - "src/Directory.Packages.props"
      - "src/nuget.config"
      - "src/dms/**"
      # The DMS E2E lanes (incl. the DS 6.1 version-coupled lane) bring up the Config Service built from
      # src/config, so config-only changes (e.g. ds61 Claims.json, ClaimsProvider, ResourceClaim seeding)
      # must still trigger this workflow's DMS + DS 6.1 validation.
      - "src/config/**"

  merge_group:
    types:
      - checks_requested

  workflow_dispatch:
    inputs:
      mssql_generated_ddl_provision_max_concurrency:
        description: "Optional MSSQL generated-DDL full provisioning concurrency limit. Defaults to the CI rollout value."
        required: false
        default: "2"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: "Release"
  MSSQL_IMAGE: "mcr.microsoft.com/mssql/server:2022-latest"
  MSSQL_CONTAINER_MEMORY: "10g"
  MSSQL_MEMORY_LIMIT_MB: "4096"
  MSSQL_TMPFS_SIZE: "4g"
  MSSQL_GENERATED_DDL_LEASE_STRATEGY: "backup-restore"
  MSSQL_GENERATED_DDL_PROVISION_MAX_CONCURRENCY: ${{ github.event.inputs.mssql_generated_ddl_provision_max_concurrency || '2' }}
  POSTGRES_INTEGRATION_IMAGE: "postgres:16.3-alpine"
  POSTGRES_CONTAINER_MEMORY: "10g"
  POSTGRES_TMPFS_SIZE: "4g"
  POSTGRES_USE_TMPFS: "true"

permissions: read-all

jobs:
  detect-fresh-build-changes:
    name: Detect Fresh Build Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      fresh_build_required: ${{ steps.detect.outputs.fresh_build_required }}
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect files that require a fresh rebuild
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "fresh_build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            base_sha="${{ github.event.merge_group.base_sha }}"

            if [[ -z "$base_sha" ]] || ! changed_files="$(git diff --name-only "$base_sha" "${{ github.sha }}")"; then
              echo "fresh_build_required=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            before="${{ github.event.before }}"

            if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            else
              changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
            fi
          fi

          fresh_build_required=false

          while IFS= read -r file; do
            case "$file" in
              src/Directory.Packages.props|src/nuget.config|src/dms/Dockerfile|src/config/Dockerfile|eng/docker-compose/*)
                fresh_build_required=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "fresh_build_required=$fresh_build_required" >> "$GITHUB_OUTPUT"

  scan-actions-bidi:
    name: Scan Actions, scan all files for BIDI Trojan Attacks
    uses: Ed-Fi-Alliance-OSS/Ed-Fi-Actions/.github/workflows/repository-scanner.yml@main
    with:
      config-file-path: ./.github/workflows/bidi-config.json

  run-bootstrap-pester-tests:
    name: Run Bootstrap Pester Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        run: Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Run Bootstrap Pester Tests
        env:
          # Opts the BulkLoadClient real-package smoke test into the CI run so a regression in the
          # pinned package version (e.g. a build that breaks the XML-mode CLI surface) is caught
          # here in seconds instead of waiting for the E2E lane to fail. The setup-dotnet step
          # above provides the SDK the smoke test needs; without it the test would self-skip
          # silently.
          DMS_BOOTSTRAP_RUN_PACKAGE_TESTS: "true"
        run: |
          # Every eng/docker-compose/tests spec runs here except BootstrapDockerSmoke.Tests.ps1,
          # which requires a live Docker stack and is deliberately excluded from this unit lane.
          $paths = @(
            "eng/docker-compose/tests/BootstrapPackageResolver.Tests.ps1",
            "eng/docker-compose/tests/BootstrapSchemaAndSecuritySelection.Tests.ps1",
            "eng/docker-compose/tests/BootstrapSeedDelivery.Tests.ps1",
            "eng/docker-compose/tests/BootstrapStandardSchemaSelection.Tests.ps1",
            "eng/docker-compose/tests/BootstrapClaimsGate.Tests.ps1",
            "eng/docker-compose/tests/BootstrapEntryPointWorkflow.Tests.ps1",
            "eng/docker-compose/tests/BootstrapSchemaDeploymentSafety.Tests.ps1",
            "eng/docker-compose/tests/BootstrapContainerPackaging.Tests.ps1",
            "eng/docker-compose/tests/SchemaPackageUtility.Tests.ps1",
            "eng/docker-compose/tests/ResolveIdentityClientSecrets.Tests.ps1",
            "eng/docker-compose/tests/LockFileParity.Tests.ps1",
            "eng/docker-compose/tests/DatabaseEngineEnvironmentFile.Tests.ps1",
            "eng/docker-compose/tests/EffectiveSchemaHashParser.Tests.ps1",
            "eng/docker-compose/tests/DataStandardEnvironmentFile.Tests.ps1",
            "eng/docker-compose/tests/DataStoreConnectionString.Tests.ps1",
            "eng/DatabaseTemplates/tests/Template-Management.Tests.ps1"
          )
          $result = Invoke-Pester -Path $paths -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) bootstrap Pester test(s) failed."
          }

  verify-lock-files:
    name: Verify DMS Lock Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Restore with locked mode
        run: dotnet restore ./src/dms/EdFi.DataManagementService.sln --locked-mode

  verify-schematools-package:
    name: Verify SchemaTools Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Set DMS Version Numbers
        id: versions
        run: |
          Import-Module ./package-helpers.psm1
          Get-VersionNumber -projectPrefix "dms"

      - name: Build DMS .NET Assemblies
        run: |
          $packageVersion = "${{ steps.versions.outputs.dms-semver }}" -replace "dms-v", ""

          ./build-dms.ps1 BuildAndPublish `
            -Configuration ${{ env.CONFIGURATION }} `
            -DMSVersion $packageVersion `
            -LockedMode

      - name: Create SchemaTools NuGet Package
        run: |
          $packageVersion = "${{ steps.versions.outputs.dms-semver }}" -replace "dms-v", ""

          ./build-dms.ps1 Package `
            -DMSVersion $packageVersion `
            -Configuration ${{ env.CONFIGURATION }} `
            -PackageTarget SchemaTools

      - name: Install and Run SchemaTools Package
        run: |
          $packageVersion = "${{ steps.versions.outputs.dms-semver }}" -replace "dms-v", ""
          $toolPath = Join-Path $env:RUNNER_TEMP "api-schema-tools"
          New-Item -ItemType Directory -Force -Path $toolPath | Out-Null

          # --source (not --add-source) keeps the install hermetic: it resolves ONLY from the
          # locally packed .nupkg and never falls back to nuget.org. .NET tool packages bundle
          # their full dependency closure, so no other feed is required, and this closes the
          # dependency-confusion window on the (public) EdFi.Api.SchemaTools id.
          dotnet tool install EdFi.Api.SchemaTools `
            --tool-path $toolPath `
            --source "${{ github.workspace }}" `
            --version $packageVersion

          $env:PATH = "$toolPath$([System.IO.Path]::PathSeparator)$env:PATH"
          api-schema-tools --help

          # Exercise real, DB-free commands against a committed fixture so the packaged
          # dependency closure is verified doing actual work, not just constructing the
          # command tree as `--help` does.
          $fixture = "./src/dms/backend/Fixtures/authoritative/ds-5.2/inputs/ds-5.2-api-schema-authoritative.json"

          # Core stack: schema load -> normalize -> hash.
          api-schema-tools hash $fixture

          # Backend.Ddl stack: effective-schema-set build -> DDL generation (both dialects) -> file emission.
          api-schema-tools ddl emit --schema $fixture --output "$env:RUNNER_TEMP/ddl-verify" --dialect both

  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: ./build-dms.ps1 Build -Configuration ${{ env.CONFIGURATION }}

      - name: Restore .NET tools
        if: success()
        run: dotnet tool restore

      - name: Run Unit Tests
        run: ./build-dms.ps1 UnitTest -Configuration ${{ env.CONFIGURATION }}

      - name: Generate Coverage Report
        if: ${{ hashFiles('coverage.cobertura.xml') != '' }}
        run: ./build-dms.ps1 Coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: Coverage Report
          path: coveragereport

      - name: Upload Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: (success() || failure())
        with:
          name: Unit Tests
          path: "**/*.trx"
          path-replace-backslashes: "true"
          reporter: dotnet-trx
          list-tests: failed
          use-actions-summary: "true"

  build-integration-test-assemblies:
    name: Build Integration Test Assemblies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout the Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Restore and Build Integration Test Projects
        run: |
          $configuration = "${{ env.CONFIGURATION }}"
          $projects = @(
            @{
              Name = "backend-mssql"
              Project = "./src/dms/backend/EdFi.DataManagementService.Backend.Mssql.Tests.Integration/EdFi.DataManagementService.Backend.Mssql.Tests.Integration.csproj"
              Assembly = "EdFi.DataManagementService.Backend.Mssql.Tests.Integration.dll"
            },
            @{
              Name = "dms-api"
              Project = "./src/dms/tests/EdFi.DataManagementService.Tests.Integration/EdFi.DataManagementService.Tests.Integration.csproj"
              Assembly = "EdFi.DataManagementService.Tests.Integration.dll"
            },
            @{
              Name = "backend-postgresql"
              Project = "./src/dms/backend/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration.csproj"
              Assembly = "EdFi.DataManagementService.Backend.Postgresql.Tests.Integration.dll"
            },
            @{
              Name = "schematools"
              Project = "./src/dms/clis/EdFi.DataManagementService.SchemaTools.Tests.Integration/EdFi.DataManagementService.SchemaTools.Tests.Integration.csproj"
              Assembly = "EdFi.DataManagementService.SchemaTools.Tests.Integration.dll"
            }
          )

          foreach ($project in $projects) {
            dotnet restore $project.Project --verbosity:normal
            dotnet build $project.Project `
              -c $configuration `
              --no-restore `
              -v normal `
              --nologo
          }

      - name: Stage Integration Test Assemblies
        run: |
          $configuration = "${{ env.CONFIGURATION }}"
          $artifactRoot = "./TestArtifacts/integration-test-assemblies"
          $projects = @(
            @{
              Name = "backend-mssql"
              OutputDirectory = "./src/dms/backend/EdFi.DataManagementService.Backend.Mssql.Tests.Integration/bin/$configuration/net10.0"
              Assembly = "EdFi.DataManagementService.Backend.Mssql.Tests.Integration.dll"
            },
            @{
              Name = "dms-api"
              OutputDirectory = "./src/dms/tests/EdFi.DataManagementService.Tests.Integration/bin/$configuration/net10.0"
              Assembly = "EdFi.DataManagementService.Tests.Integration.dll"
            },
            @{
              Name = "backend-postgresql"
              OutputDirectory = "./src/dms/backend/EdFi.DataManagementService.Backend.Postgresql.Tests.Integration/bin/$configuration/net10.0"
              Assembly = "EdFi.DataManagementService.Backend.Postgresql.Tests.Integration.dll"
            },
            @{
              Name = "schematools"
              OutputDirectory = "./src/dms/clis/EdFi.DataManagementService.SchemaTools.Tests.Integration/bin/$configuration/net10.0"
              Assembly = "EdFi.DataManagementService.SchemaTools.Tests.Integration.dll"
            }
          )

          if (Test-Path $artifactRoot) {
            Remove-Item -LiteralPath $artifactRoot -Recurse -Force
          }

          function Copy-OutputDirectory {
            param(
              [string] $SourceDirectory,
              [string] $DestinationDirectory
            )

            New-Item -ItemType Directory -Force -Path $DestinationDirectory | Out-Null
            Get-ChildItem -LiteralPath $SourceDirectory -Force | ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination $DestinationDirectory -Recurse -Force
            }
          }

          foreach ($project in $projects) {
            $destinationDirectory = Join-Path $artifactRoot $project.Name
            Copy-OutputDirectory -SourceDirectory $project.OutputDirectory -DestinationDirectory $destinationDirectory

            $depsJson = $project.Assembly -replace '\.dll$', '.deps.json'
            $runtimeConfig = $project.Assembly -replace '\.dll$', '.runtimeconfig.json'
            $requiredFiles = @(
              $project.Assembly,
              $depsJson,
              $runtimeConfig,
              "NUnit3.TestAdapter.dll",
              "testhost.dll"
            )

            foreach ($requiredFile in $requiredFiles) {
              $path = Join-Path $destinationDirectory $requiredFile
              if (-not (Test-Path $path)) {
                throw "Required integration test artifact is missing: $path"
              }
            }
          }

          $schemaToolsTestOutput = "./src/dms/clis/EdFi.DataManagementService.SchemaTools.Tests.Integration/bin/$configuration/net10.0"
          $schemaToolsCliOutput = "./src/dms/clis/EdFi.DataManagementService.SchemaTools/bin/$configuration/net10.0"
          Copy-OutputDirectory `
            -SourceDirectory $schemaToolsTestOutput `
            -DestinationDirectory (Join-Path $artifactRoot "src/dms/clis/EdFi.DataManagementService.SchemaTools.Tests.Integration/bin/$configuration/net10.0")
          Copy-OutputDirectory `
            -SourceDirectory $schemaToolsCliOutput `
            -DestinationDirectory (Join-Path $artifactRoot "src/dms/clis/EdFi.DataManagementService.SchemaTools/bin/$configuration/net10.0")

      - name: Upload Integration Test Assemblies
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: dms-integration-test-assemblies
          path: TestArtifacts/integration-test-assemblies
          if-no-files-found: error
          retention-days: 1

  build-ci-docker-images:
    name: Build CI Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      use_prebuilt_images: ${{ steps.prepare-images.outputs.use_prebuilt_images }}
      dms_image: ${{ steps.prepare-images.outputs.dms_image }}
      config_image: ${{ steps.prepare-images.outputs.config_image }}
      dms_compose_image: ${{ steps.prepare-images.outputs.dms_compose_image }}
      config_compose_image: ${{ steps.prepare-images.outputs.config_compose_image }}
    env:
      # Set repository variable REBUILD_DOWNSTREAM_IMAGES=true to keep downstream
      # E2E/OpenAPI jobs rebuilding local images while rolling this change back or forward.
      REBUILD_DOWNSTREAM_IMAGES: ${{ vars.REBUILD_DOWNSTREAM_IMAGES }}
      IS_FORK_PULL_REQUEST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Prepare CI image tags
        id: prepare-images
        shell: bash
        run: |
          rebuild_downstream_images="${REBUILD_DOWNSTREAM_IMAGES:-false}"
          rebuild_downstream_images="${rebuild_downstream_images,,}"
          use_prebuilt_images="true"

          case "$rebuild_downstream_images" in
            1|true|yes|y|on)
              use_prebuilt_images="false"
              ;;
          esac

          if [[ "$IS_FORK_PULL_REQUEST" == "true" ]]; then
            use_prebuilt_images="false"
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image_sha="${PULL_REQUEST_HEAD_SHA:-$GITHUB_SHA}"
          dms_image="ghcr.io/${owner}/data-management-service-ed-fi-api-ci:${image_sha}"
          config_image="ghcr.io/${owner}/data-management-service-ed-fi-api-config-ci:${image_sha}"

          dms_compose_image=""
          config_compose_image=""
          if [[ "$use_prebuilt_images" == "true" ]]; then
            dms_compose_image="$dms_image"
            config_compose_image="$config_image"
          fi

          {
            echo "use_prebuilt_images=$use_prebuilt_images"
            echo "dms_image=$dms_image"
            echo "config_image=$config_image"
            echo "dms_compose_image=$dms_compose_image"
            echo "config_compose_image=$config_compose_image"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout the Repo
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Login to GitHub Container Registry
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push DMS CI Docker image
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          context: ./src/dms
          file: ./src/dms/Dockerfile
          build-contexts: |
            parentdir=./src
          push: true
          tags: ${{ steps.prepare-images.outputs.dms_image }}
          cache-from: type=gha,scope=dms-pr-dms-image
          cache-to: type=gha,mode=max,scope=dms-pr-dms-image

      - name: Build and push Config CI Docker image
        if: steps.prepare-images.outputs.use_prebuilt_images == 'true'
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc # v6.11.0
        with:
          context: ./src/config
          file: ./src/config/Dockerfile
          build-contexts: |
            parentdir=./src
          push: true
          tags: ${{ steps.prepare-images.outputs.config_image }}
          cache-from: type=gha,scope=dms-pr-config-image
          cache-to: type=gha,mode=max,scope=dms-pr-config-image

  run-backend-mssql-integration-tests:
    name: Run Backend MSSQL Integration Tests (${{ matrix.shard-name }})
    needs: build-integration-test-assemblies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TEST_ASSEMBLY: ./TestArtifacts/integration-test-assemblies/backend-mssql/EdFi.DataManagementService.Backend.Mssql.Tests.Integration.dll
      MSSQL_FIXTURE_TIMINGS_PATH: ${{ github.workspace }}/TestResults/test-timings/mssql-shard-${{ matrix.shard }}/mssql-fixture-setup-timings.csv
      MSSQL_TEST_SHARD: ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            shard-name: Shard 1
            shard-category: MssqlCiShard1
          - shard: 2
            shard-name: Shard 2
            shard-category: MssqlCiShard2
          - shard: 3
            shard-name: Shard 3
            shard-category: MssqlCiShard3
          - shard: 4
            shard-name: Shard 4
