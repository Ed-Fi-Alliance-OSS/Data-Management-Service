name: Scheduled pre Image Tests

on:
  workflow_dispatch:
  schedule:
  - cron: '30 8 * * 6' # Scheduled the job to run every Saturday at 8 AM UTC

permissions: read-all

jobs:
  test:
    name: pre Image Tests (${{ matrix.identityprovider }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        identityprovider: [keycloak, self-contained]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Cache Nuget packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 #v4.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: DMS Build
        id: build_step
        run: ./build-dms.ps1 Build -Configuration Release -IdentityProvider ${{matrix.identityprovider}}

      - name: Run DMS End to End Tests
        id: e2e
        if: success()
        continue-on-error: true
        # This lane runs against the default DS 5.2 stack, so exclude the DS 6.1 version-coupled
        # scenarios (@StandardVersion-6_1); those are covered on every PR by the run-e2e-tests-ds61
        # lane and in full by the scheduled smoke test workflow. The non-empty filter makes
        # build-dms.ps1 write the ...E2E.filtered.trx result file (see the upload step below).
        run: ./build-dms.ps1 E2ETest -UsePublishedImage -Configuration Release -IdentityProvider ${{ matrix.identityprovider }} -EnvironmentFile './.env.e2e' -TestFilter 'Category!=@StandardVersion-6_1'

      - name: Export DMS E2E Docker Logs
        if: always() && steps.e2e.outcome == 'failure'
        run: |
          $logDir = "${{ github.workspace }}/logs/e2e"
          Remove-Item -Path $logDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          $containers = @(docker ps -a --format "{{.Names}}" | Sort-Object)

          if ($containers.Count -eq 0) {
              Write-Host "No Docker containers found for log export."
              exit 0
          }

          foreach ($container in $containers) {
              $logPath = Join-Path $logDir "$container.log"
              docker logs $container > $logPath 2>&1
          }

      - name: Upload DMS E2E Logs
        if: always() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: scheduled-pre-image-logs-${{ matrix.identityprovider }}-e2e
          path: |
            ${{ github.workspace }}/logs/e2e
          retention-days: 10

      - name: Upload DMS End to End Test Results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5
        with:
          name: scheduled-pre-image-e2e-results-${{ matrix.identityprovider }}
          path: TestResults/EdFi.DataManagementService.Tests.E2E.filtered.trx
          if-no-files-found: ignore

      - name: Fail if DMS E2E failed
        if: always() && steps.e2e.outcome == 'failure'
        run: |
          Write-Host "DMS E2E outcome: ${{ steps.e2e.outcome }}"
          throw "DMS E2E failed."

      - name: Notify Slack on success
        if: success() && github.event_name != 'workflow_dispatch'
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d #v2.0.0
        with:
          payload: |
            {
              "text": "✅ Scheduled pre image tests passed for identityprovider=${{ matrix.identityprovider }}."
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Notify Slack on failure
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d #v2.0.0
        with:
          payload: |
            {
              "text": "❌ Scheduled pre image tests result: ${{ job.status }}\nIdentityProvider: ${{ matrix.identityprovider }}\nDMS E2E: ${{ steps.e2e.outcome }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ Scheduled pre image tests result: ${{ job.status }}\n*Identity Provider:* ${{ matrix.identityprovider }}\n*DMS E2E:* ${{ steps.e2e.outcome }}\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Commit Message:* ${{ github.event.head_commit.message || 'No commit message available' }}\n*Log URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
