name: Pkg EdFi.Dms.Populated.Template.PostgreSQL
on:
  release:
    types:
      - released
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions: read-all

jobs:
  build-populated-template:
    name: Build Populated Template
    uses: ./.github/workflows/reusable-template-pkg.PostgreSQL.yml
    with:
      template-type: "Populated"
      standard-version: "5.2.0"
      skip-publish: false
    secrets: inherit
