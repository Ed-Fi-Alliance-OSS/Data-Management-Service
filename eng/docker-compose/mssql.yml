# SQL Server counterpart to postgresql.yml. The service is deliberately named "db" so this
# file is a drop-in swap for postgresql.yml in any compose set that gates on
# `depends_on: db: condition: service_healthy` (local-config.yml). Both the CMS-only stack
# (start-local-config.ps1, DMS_CONFIG_DATASTORE=mssql) and the full DMS stack
# (start-local-dms.ps1 -DatabaseEngine mssql) select this file instead of postgresql.yml.
# Image and sqlcmd path match the CI integration-test container.
services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: dms-mssql
    environment:
      ACCEPT_EULA: "Y"
      # Developer Edition, matching CI (MSSQL_PID=Developer).
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-abcdefgh1!}
      MSSQL_MEMORY_LIMIT_MB: ${MSSQL_MEMORY_LIMIT_MB:-4096}
    ports:
      - '127.0.0.1:${MSSQL_PORT:-1435}:1433'
    volumes:
      - dms-mssql:/var/opt/mssql
    networks:
      - dms
    restart: always
    hostname: dms-mssql
    healthcheck:
      # $$ defers expansion to the container shell so the password is read from the
      # container environment rather than interpolated by docker compose. Handing it to
      # sqlcmd via SQLCMDPASSWORD keeps it out of the sqlcmd argv in the container process
      # list. sqlcmd 18 requires -C (trust server certificate) for the self-signed dev
      # certificate.
      test: ["CMD-SHELL", "SQLCMDPASSWORD=\"$$MSSQL_SA_PASSWORD\" /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -Q \"SELECT 1\" -C -b || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

networks:
  dms:
    external: true

volumes:
  dms-mssql:
