services:
  db:
    image: postgres:16.8-alpine@sha256:951d0626662c85a25e1ba0a89e64f314a2b99abced2c85b4423506249c2d82b0
    container_name: dms-postgresql
    # Raise the shared lock pool: schema provisioning and TRUNCATE-all run as single
    # large transactions, and parallel test fixtures exhaust the default budget
    # (max_locks_per_transaction=64), surfacing PG error 53200 (out of shared memory).
    command: ["postgres", "-c", "max_locks_per_transaction=256"]
    volumes:
      - dms-postgresql:/var/lib/postgresql/data
      - ./postgresql-init.sh:/docker-entrypoint-initdb.d/postgresql-init.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abcdefgh1!}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-edfi_datamanagementservice}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    networks:
      - dms
    restart: always
    hostname: dms-postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 30
networks:
  dms:
    external: true

volumes:
  dms-postgresql:


