services:
  dms:
    image: ${DMS_DOCKER_IMAGE:-ed-fi-api-local}
    container_name: ed-fi-api
    build:
      context: ../../src/dms/
      additional_contexts:
        parentdir: ../../src/
    environment:
      ASPNETCORE_HTTP_PORTS: ${DMS_HTTP_PORTS:-8080}
      AppSettings__AuthenticationService: ${OAUTH_TOKEN_ENDPOINT:-http://host.docker.internal:8080/oauth/token}
      AppSettings__BypassTypeCoercion: ${BYPASS_TYPE_COERCION:-false}
      AppSettings__AllowIdentityUpdateOverrides: ${ALLOW_IDENTITY_UPDATE_OVERRIDES:-}
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-DEBUG}
      # Mask incoming HTTP POST and PUT request body structures in DEBUG logging
      AppSettings__MaskRequestBodyInLogs: ${MASK_REQUEST_BODY_IN_LOGS:-true}
      AppSettings__MaximumPageSize: ${MAXIMUM_PAGE_SIZE:-500}
      # Segment of the url to use as base for all request. The default path base is deliberately blank on the following line
      AppSettings__PathBase: ${PATH_BASE:-}
      AppSettings__ReverseProxy__UseForwardedHeaders: ${USE_REVERSE_PROXY_HEADERS:-false}
      # Trusted reverse-proxy sources honored when ReverseProxy:UseForwardedHeaders is true (comma-separated).
      # Leave empty to trust loopback only. KnownProxies: exact IPs; KnownNetworks: CIDR ranges.
      AppSettings__ReverseProxy__KnownProxies: ${REVERSE_PROXY_KNOWN_PROXIES:-}
      AppSettings__ReverseProxy__KnownNetworks: ${REVERSE_PROXY_KNOWN_NETWORKS:-}
      AppSettings__StartupStatusFilePath: ${DMS_STARTUP_STATUS_FILE_PATH:-/tmp/dms-startup-status.json}
      # The default correlation id header is deliberately blank on the following line
      AppSettings__CorrelationIdHeader: ${CORRELATION_ID_HEADER:-}
      AppSettings__Datastore: ${DMS_DATASTORE:-postgresql}
      DatabaseOptions__IsolationLevel: ${DATABASE_ISOLATION_LEVEL:-RepeatableRead}
      # "DATABASE_CONNECTION_STRING_ADMIN" can have alternate credentials with elevated permissions for creating database objects
      DATABASE_CONNECTION_STRING_ADMIN: ${DATABASE_CONNECTION_STRING_ADMIN:-host=dms-postgresql;port=5432;username=postgres;password=${POSTGRES_PASSWORD};database=${POSTGRES_DB_NAME};}
      CircuitBreaker__FailureRatio: ${FAILURE_RATIO:-0.01}
      CircuitBreaker__SamplingDurationSeconds: ${SAMPLING_DURATION_SECONDS:-10}
      CircuitBreaker__MinimumThroughput: ${MINIMUM_THROUGHPUT:-2}
      CircuitBreaker__BreakDurationSeconds: ${BREAK_DURATION_SECONDS:-30}
      ConfigurationServiceSettings__BaseUrl: ${CONFIG_SERVICE_URL:-http://ed-fi-api-config:8081}
      ConfigurationServiceSettings__ClientId: ${CONFIG_SERVICE_CLIENT_ID:-CMSReadOnlyAccess}
      ConfigurationServiceSettings__Scope: ${CONFIG_SERVICE_CLIENT_SCOPE:-edfi_admin_api/readonly_access}
      ConfigurationServiceSettings__ClientSecret: ${CONFIG_SERVICE_CLIENT_SECRET}
      ConfigurationServiceSettings__EncryptionKey: ${DMS_CONFIG_DATABASE_ENCRYPTION_KEY:-}
      AppSettings__MultiTenancy: ${DMS_MULTI_TENANCY:-false}
      AppSettings__UseApiSchemaPath: ${USE_API_SCHEMA_PATH:-false}
      AppSettings__ApiSchemaPath: ${API_SCHEMA_PATH:-}
      Cors__SwaggerUIOrigin: ${DMS_SWAGGER_UI_URL:-http://localhost:8082}
      AppSettings__EnableManagementEndpoints: ${DMS_ENABLE_MANAGEMENT_ENDPOINTS:-false}
      AppSettings__EnableClaimsetReload: ${DMS_ENABLE_CLAIMSET_RELOAD:-false}
      CacheSettings__ClaimSetsCacheExpirationSeconds: ${DMS_CLAIMSETS_CACHE_EXPIRATION_SECONDS:-600}
      CacheSettings__ApplicationContextCacheExpirationSeconds: ${DMS_APPLICATION_CONTEXT_CACHE_EXPIRATION_SECONDS:-600}
      CacheSettings__TokenCacheExpirationSeconds: ${DMS_TOKEN_CACHE_EXPIRATION_SECONDS:-1500}
      CacheSettings__ProfileCacheExpirationSeconds: ${DMS_PROFILE_CACHE_EXPIRATION_SECONDS:-1800}
      CacheSettings__DataStoreCacheExpirationSeconds: ${DMS_DATASTORE_CACHE_EXPIRATION_SECONDS:-600}
      CacheSettings__DataStoreCacheRefreshEnabled: ${DMS_DATASTORE_CACHE_REFRESH_ENABLED:-true}
      AppSettings__DomainsExcludedFromOpenApi: ${DOMAINS_EXCLUDED_FROM_OPEN_API:-}
      AppSettings__RouteQualifierSegments: ${ROUTE_QUALIFIER_SEGMENTS:-}
      SCHEMA_PACKAGES: ${SCHEMA_PACKAGES:-}
      # JWT Authentication
      JwtAuthentication__Authority: ${DMS_JWT_AUTHORITY:-http://dms-keycloak:8080/realms/edfi}
      JwtAuthentication__Audience: ${DMS_JWT_AUDIENCE:-account}
      JwtAuthentication__MetadataAddress: ${DMS_JWT_METADATA_ADDRESS:-}
      JwtAuthentication__RequireHttpsMetadata: ${DMS_JWT_REQUIRE_HTTPS_METADATA:-false}
      JwtAuthentication__RoleClaimType: ${DMS_JWT_ROLE_CLAIM_TYPE:-http://schemas.microsoft.com/ws/2008/06/identity/claims/role}
      JwtAuthentication__ClientRole: ${DMS_JWT_CLIENT_ROLE:-dms-client}
      JwtAuthentication__ClockSkewSeconds: ${DMS_JWT_CLOCK_SKEW_SECONDS:-30}
      JwtAuthentication__RefreshIntervalMinutes: ${DMS_JWT_REFRESH_INTERVAL_MINUTES:-60}
      JwtAuthentication__AutomaticRefreshIntervalHours: ${DMS_JWT_AUTOMATIC_REFRESH_INTERVAL_HOURS:-24}
    ports:
      - "127.0.0.1:${DMS_HTTP_PORTS}:${DMS_HTTP_PORTS}"
    networks:
      - dms
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${DMS_HTTP_PORTS:-8080}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 50
    hostname: ed-fi-api

networks:
  dms:
    external: true
