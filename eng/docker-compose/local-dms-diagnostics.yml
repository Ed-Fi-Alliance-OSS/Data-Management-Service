services:
  dms:
    environment:
      DOTNET_EnableDiagnostics: ${DMS_DOTNET_ENABLE_DIAGNOSTICS:-1}
      DOTNET_DiagnosticPorts: ${DMS_DOTNET_DIAGNOSTIC_PORTS:-}
      TMPDIR: ${DMS_DOTNET_TMPDIR:-/diag}
    volumes:
      - ${DMS_DOTNET_DIAGNOSTICS_DIR:-../../.dms-dotnet-diagnostics}:/diag
