#cloud-config
# Bootstraps a fresh Ubuntu VM with Docker, PowerShell, git, and certbot.
# __ADMIN_USER__ is replaced by provision-vm.ps1 at deploy time.
package_update: true
packages:
  - ca-certificates
  - curl
  - git
  - apt-transport-https
runcmd:
  # Docker Engine + Compose plugin
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker __ADMIN_USER__
  - systemctl enable --now docker
  # PowerShell 7 (for bootstrap + setup scripts)
  - snap install powershell --classic
  # certbot (Let's Encrypt)
  - snap install certbot --classic
  - ln -sf /snap/bin/certbot /usr/local/bin/certbot
  # No .NET SDK installed: api-schema-tools (the relational provisioner, published as the
  # EdFi.Api.SchemaTools .NET tool) needs a .NET 10 SDK on the host, so build it self-contained
  # in a container or restore a relational populated template (DMS-1159) instead — see
  # provision/REDEPLOY.md Part C and docs/infrastructure.md "Known issues" #5.
  - touch /var/lib/cloud/dms-sec-provisioned
