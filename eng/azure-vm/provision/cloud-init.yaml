#cloud-config
# Bootstraps a fresh Ubuntu VM with Docker, PowerShell, git, and certbot.
# __ADMIN_USER__ is replaced by provision-vm.ps1 at deploy time.
package_update: true
packages:
  - ca-certificates
  - curl
  - git
  - apt-transport-https
runcmd:
  # Docker Engine + Compose plugin
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker __ADMIN_USER__
  - systemctl enable --now docker
  # PowerShell 7 (for bootstrap + setup scripts)
  - snap install powershell --classic
  # certbot (Let's Encrypt)
  - snap install certbot --classic
  - ln -sf /snap/bin/certbot /usr/local/bin/certbot
  # GAP (provision/README.md "Known gaps" #1): no .NET SDK installed, so the dms-schema
  # relational provisioner can't be built here. Prefer restoring a relational populated
  # template (DMS-1159) over provisioning from source.
  - touch /var/lib/cloud/dms-sec-provisioned
