# SPDX-License-Identifier: Apache-2.0
#
# Shared Keycloak identity provider for the security-review environment.
#
# Kept in a separate compose file (as in AdminApp-v4-security-review) so its
# realm + clients survive `reset.sh`, which drops only the app/database volumes.
# Reachable through the gateway at /auth.
#
# Realm + service clients are created by bootstrap/bootstrap.ps1 (which imports the
# repo's canonical setup-keycloak.ps1). MFA is intentionally NOT enabled so credentials
# can be shared with the review team — recommend enforcing MFA for any real deployment.
#
# NOT FOR PRODUCTION.

name: dms-security-review

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.7
    hostname: dms-keycloak
    container_name: dms-sec-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD in .env}"
      # Public base URL; with the relative path below the issuer becomes
      # ${PUBLIC_BASE_URL}/auth/realms/<realm>.
      KC_HOSTNAME: "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env}/auth"
      # Allow internal (in-network) access via the request host so DMS/CMS can
      # fetch JWKS at http://dms-keycloak:8080/auth/... while tokens keep the
      # public issuer.
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_CONSOLE_LEVEL: "${KEYCLOAK_LOG_LEVEL:-info}"
    # The volume persists Keycloak's default dev-file H2 database. Keycloak does NOT support
    # H2 migration across version bumps -- when changing the image pin above, wipe the
    # dms-sec-keycloak volume and re-run bootstrap.ps1 (or configure KC_DB against a real
    # database if realm durability across upgrades matters). Production-mode `start` without
    # a real DB is deprecated upstream and slated to be refused at Keycloak 27.
    volumes:
      - dms-sec-keycloak:/opt/keycloak/data
    command: ["start"]
    # Explicit alias so DMS/CMS/gateway can reach Keycloak at `dms-keycloak` regardless of
    # Docker's hostname-registration behavior (the service name is `keycloak`; this makes the
    # `dms-keycloak` name they reference an intentional, self-documenting network alias).
    networks:
      dms-sec:
        aliases:
          - dms-keycloak
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]

networks:
  dms-sec:
    external: true
    name: dms-sec

volumes:
  dms-sec-keycloak:
