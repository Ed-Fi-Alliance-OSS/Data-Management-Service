# SPDX-License-Identifier: Apache-2.0
#
# DMS security-review environment.
#
# One Docker network hosting TWO independent DMS+CMS stacks behind a single
# NGINX gateway (TLS + path routing), modeled on the Ed-Fi
# AdminApp-v4-security-review deployment:
#
#   /st-dms     single-tenant  Data Management Service API
#   /st-config  single-tenant  Configuration Service (admin API)
#   /mt-dms     multi-tenant   Data Management Service API
#   /mt-config  multi-tenant   Configuration Service (admin API)
#   /auth       Keycloak (shared identity provider, see keycloak.yml)
#   /pgadmin    pgAdmin (direct database access for the review team)
#
# The two stacks are byte-identical images differing only by the multitenancy
# flags, path base, and per-stack database. Keycloak lives in keycloak.yml so its
# realm/clients survive `reset.sh` (which drops only the app+db volumes).
#
# NOT FOR PRODUCTION. Contains review-only default secrets.

name: dms-security-review

# ---------------------------------------------------------------------------
# Shared DMS API environment. Per-stack services override path base, tenancy,
# database, and the Configuration Service URL.
# ---------------------------------------------------------------------------
x-dms-common-env: &dms-common-env
  ASPNETCORE_HTTP_PORTS: "8080"
  # Advertised OAuth token endpoint: DMS echoes this value verbatim into the Discovery API
  # (urls.oauth) and the OpenAPI security scheme (tokenUrl), so it MUST be reachable by external
  # clients -- hence the PUBLIC Keycloak URL via the gateway /auth route, not an internal hostname.
  # It is also the /oauth/token proxy's forward target; that proxy now hairpins to the public URL
  # (so it only works with a publicly-trusted cert) -- clients should authenticate against this
  # Keycloak URL directly. JWT validation is unaffected (it uses JwtAuthentication__MetadataAddress).
  AppSettings__AuthenticationService: "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env}/auth/realms/${KEYCLOAK_REALM:-edfi}/protocol/openid-connect/token"
  NEED_DATABASE_SETUP: "false"
  AppSettings__DeployDatabaseOnStartup: "false"  # data DBs are provisioned out-of-band by dms-schema; never run the legacy DbUp installer
  AppSettings__UseRelationalBackend: "${USE_RELATIONAL_BACKEND:-true}"
  AppSettings__BypassStringTypeCoercion: "false"
  Serilog__MinimumLevel__Default: "${LOG_LEVEL:-Information}"
  AppSettings__MaskRequestBodyInLogs: "true"
  AppSettings__MaximumPageSize: "500"
  AppSettings__UseReverseProxyHeaders: "true"
  AppSettings__Datastore: "postgresql"
  DatabaseOptions__IsolationLevel: "ReadCommitted"
  AppSettings__UseApiSchemaPath: "true"
  AppSettings__ApiSchemaPath: "/app/ApiSchema"
  # The staged ApiSchema workspace (.bootstrap/ApiSchema, produced by the official
  # prepare-dms-schema.ps1) is mounted read-only at /app/ApiSchema in each DMS service below,
  # so the image's effective-schema hash matches exactly what 'dms-schema ddl provision' wrote.
  # Opt-in for troubleshooting / claim-set iteration (default off).
  AppSettings__EnableManagementEndpoints: "${DMS_ENABLE_MANAGEMENT_ENDPOINTS:-false}"
  AppSettings__EnableClaimsetReload: "${DMS_ENABLE_CLAIMSET_RELOAD:-false}"
  ConfigurationServiceSettings__ClientId: "${CONFIG_SERVICE_CLIENT_ID:-CMSReadOnlyAccess}"
  ConfigurationServiceSettings__Scope: "${CONFIG_SERVICE_CLIENT_SCOPE:-edfi_admin_api/readonly_access}"
  ConfigurationServiceSettings__ClientSecret: "${CONFIG_SERVICE_CLIENT_SECRET:?set CONFIG_SERVICE_CLIENT_SECRET in .env}"
  ConfigurationServiceSettings__EncryptionKey: "${DMS_CONFIG_DATABASE_ENCRYPTION_KEY:?set DMS_CONFIG_DATABASE_ENCRYPTION_KEY in .env}"
  ConfigurationServiceSettings__CacheExpirationMinutes: "${CACHE_EXPIRATION_MINUTES:-10}"
  # JWT validation. Authority = public issuer (must match token `iss`);
  # MetadataAddress = internal so DMS never has to trust the gateway cert.
  JwtAuthentication__Authority: "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env}/auth/realms/${KEYCLOAK_REALM:-edfi}"
  JwtAuthentication__MetadataAddress: "http://dms-keycloak:8080/auth/realms/${KEYCLOAK_REALM:-edfi}/.well-known/openid-configuration"
  JwtAuthentication__Audience: "${DMS_JWT_AUDIENCE:-account}"
  JwtAuthentication__RequireHttpsMetadata: "false"
  JwtAuthentication__RoleClaimType: "http://schemas.microsoft.com/ws/2008/06/identity/claims/role"
  JwtAuthentication__ClientRole: "dms-client"
  JwtAuthentication__ClockSkewSeconds: "30"

# ---------------------------------------------------------------------------
# Shared Configuration Service environment.
# ---------------------------------------------------------------------------
x-cms-common-env: &cms-common-env
  ASPNETCORE_HTTP_PORTS: "8081"
  AppSettings__Datastore: "postgresql"
  DatabaseSettings__EncryptionKey: "${DMS_CONFIG_DATABASE_ENCRYPTION_KEY:?set DMS_CONFIG_DATABASE_ENCRYPTION_KEY in .env}"
  AppSettings__DeployDatabaseOnStartup: "true"
  AppSettings__IdentityProvider: "${IDENTITY_PROVIDER:-keycloak}"
  AppSettings__UseReverseProxyHeaders: "true"
  IdentitySettings__AllowRegistration: "true"
  IdentitySettings__ConfigServiceRole: "cms-client"
  IdentitySettings__ClientRole: "dms-client"
  IdentitySettings__Authority: "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env}/auth/realms/${KEYCLOAK_REALM:-edfi}"
  IdentitySettings__Audience: "${DMS_JWT_AUDIENCE:-account}"
  IdentitySettings__ClientId: "${DMS_CONFIG_IDENTITY_CLIENT_ID:-DmsConfigurationService}"
  IdentitySettings__ClientSecret: "${DMS_CONFIG_IDENTITY_CLIENT_SECRET:?set DMS_CONFIG_IDENTITY_CLIENT_SECRET in .env}"
  IdentitySettings__ClientSecretValidation__MinimumLength: "32"
  IdentitySettings__ClientSecretValidation__MaximumLength: "128"
  IdentitySettings__RequireHttpsMetadata: "false"
  IdentitySettings__RoleClaimType: "http://schemas.microsoft.com/ws/2008/06/identity/claims/role"
  IdentitySettings__EncryptionKey: "${DMS_CONFIG_IDENTITY_ENCRYPTION_KEY:?set DMS_CONFIG_IDENTITY_ENCRYPTION_KEY in .env}"
  IdentitySettings__HashingIterations: "210000"
  # Embedded claim sets include E2E-NoFurtherAuthRequiredClaimSet (full access),
  # E2E-NameSpaceBasedClaimSet, and E2E-RelationshipsWithEdOrgsOnlyClaimSet (school/district-level).
  # Set DMS_CONFIG_CLAIMS_SOURCE=Hybrid to also load custom claim set JSON dropped into ./claims
  # (mounted below). Custom claim sets can also be created at runtime via POST/import /v3/claimSets.
  ClaimsOptions__ClaimsSource: "${DMS_CONFIG_CLAIMS_SOURCE:-Embedded}"
  ClaimsOptions__ClaimsDirectory: "/app/additional-claims"
  # Enables POST /management/reload-claims (re-seeds the claim-set catalog from the
  # configured source into an already-populated config DB). Keep "false" for the review;
  # flip to "true" only to refresh claims (e.g. after pulling a newer image), then back.
  ClaimsOptions__DangerouslyEnableUnrestrictedClaimsLoading: "${DMS_CONFIG_ENABLE_CLAIMS_RELOAD:-false}"
  Serilog__MinimumLevel__Default: "${DMS_CONFIG_LOG_LEVEL:-Information}"

x-app-defaults: &app-defaults
  restart: unless-stopped
  networks: [dms-sec]

services:
  # =========================================================================
  # Shared data store. One PostgreSQL server; init script creates per-stack
  # databases (see postgres/init-databases.sh).
  # =========================================================================
  postgres:
    image: postgres:16.8-alpine
    hostname: postgres
    container_name: dms-sec-postgres
    command: ["postgres", "-c", "max_locks_per_transaction=256"]
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
    volumes:
      - dms-sec-postgres:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [dms-sec]
    restart: unless-stopped

  # =========================================================================
  # Single-tenant stack
  # =========================================================================
  st-dms:
    <<: *app-defaults
    image: edfialliance/data-management-service:${DMS_IMAGE_TAG:-pre}
    hostname: st-dms
    container_name: dms-sec-st-dms
    environment:
      <<: *dms-common-env
      AppSettings__PathBase: "st-dms"
      AppSettings__MultiTenancy: "false"
      AppSettings__RouteQualifierSegments: ""
      ConnectionStrings__DatabaseConnection: "host=postgres;port=5432;username=${POSTGRES_USER:-postgres};password=${POSTGRES_PASSWORD};database=edfi_st;NoResetOnClose=true;"
      DATABASE_CONNECTION_STRING_ADMIN: "host=postgres;port=5432;username=${POSTGRES_USER:-postgres};password=${POSTGRES_PASSWORD};database=edfi_st;"
      ConfigurationServiceSettings__BaseUrl: "http://st-config:8081"
    volumes:
      - ./.bootstrap/ApiSchema:/app/ApiSchema:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/st-dms/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30

  st-config:
    <<: *app-defaults
    image: edfialliance/dms-configuration-service:${DMS_IMAGE_TAG:-pre}
    hostname: st-config
    container_name: dms-sec-st-config
    environment:
      <<: *cms-common-env
      AppSettings__PathBase: "st-config"
      AppSettings__MultiTenancy: "false"
      DatabaseSettings__DatabaseConnection: "host=postgres;port=5432;username=${POSTGRES_USER:-postgres};password=${POSTGRES_PASSWORD};database=edfi_st_config;"
    volumes:
      - ./claims:/app/additional-claims:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/st-config/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30

  # =========================================================================
  # Multi-tenant stack
  # =========================================================================
  mt-dms:
    <<: *app-defaults
    image: edfialliance/data-management-service:${DMS_IMAGE_TAG:-pre}
    hostname: mt-dms
    container_name: dms-sec-mt-dms
    environment:
      <<: *dms-common-env
      AppSettings__PathBase: "mt-dms"
      AppSettings__MultiTenancy: "true"
      AppSettings__RouteQualifierSegments: "${ROUTE_QUALIFIER_SEGMENTS:-schoolYear}"
      ConnectionStrings__DatabaseConnection: "host=postgres;port=5432;username=${POSTGRES_USER:-postgres};password=${POSTGRES_PASSWORD};database=edfi_mt;NoResetOnClose=true;"
      DATABASE_CONNECTION_STRING_ADMIN: "host=postgres;port=5432;username=${POSTGRES_USER:-postgres};password=${POSTGRES_PASSWORD};database=edfi_mt;"
      ConfigurationServiceSettings__BaseUrl: "http://mt-config:8081"
    volumes:
      - ./.bootstrap/ApiSchema:/app/ApiSchema:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/mt-dms/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30

  mt-config:
    <<: *app-defaults
    image: edfialliance/dms-configuration-service:${DMS_IMAGE_TAG:-pre}
    hostname: mt-config
    container_name: dms-sec-mt-config
    environment:
      <<: *cms-common-env
      AppSettings__PathBase: "mt-config"
      AppSettings__MultiTenancy: "true"
      DatabaseSettings__DatabaseConnection: "host=postgres;port=5432;username=${POSTGRES_USER:-postgres};password=${POSTGRES_PASSWORD};database=edfi_mt_config;"
    volumes:
      - ./claims:/app/additional-claims:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/mt-config/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30

  # =========================================================================
  # pgAdmin — data-level "make changes" surface for the review team.
  # Reachable at /pgadmin (lock down via NSG, see provision/ runbook).
  # =========================================================================
  pgadmin:
    <<: *app-defaults
    image: dpage/pgadmin4:8.14
    hostname: pgadmin
    container_name: dms-sec-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@example.org}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:?set PGADMIN_DEFAULT_PASSWORD in .env}"
      SCRIPT_NAME: "/pgadmin"
    depends_on:
      postgres: { condition: service_healthy }

  # =========================================================================
  # NGINX gateway — TLS termination + path routing (single public hostname).
  # =========================================================================
  gateway:
    image: nginx:1.27-alpine
    hostname: gateway
    container_name: dms-sec-gateway
    environment:
      PUBLIC_HOST: "${PUBLIC_HOST:-localhost}"
      EXTERNAL_PORT: "${EXTERNAL_PORT:-443}"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./ssl:/ssl:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - st-dms
      - st-config
      - mt-dms
      - mt-config
    networks: [dms-sec]
    restart: unless-stopped

networks:
  dms-sec:
    external: true
    name: dms-sec

volumes:
  dms-sec-postgres:
